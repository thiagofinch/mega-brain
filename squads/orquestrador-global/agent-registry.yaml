# Agent Registry — Orquestrador Global Squad
# Consolidated index for agent discovery and routing.
# Synced 2026-04-30 (W5g) with squads/orquestrador-global/config.yaml agents:[] block (post-PA-6.1).

squad: orquestrador-global
version: 3.1.0                    # was 2.1.0; bumped to match config.yaml
total_agents: 7                   # was 5; reflects post-PA-6.1 inventory
type: infrastructure
synced_at: "2026-04-30"
synced_by: "/megabrain-remediate-squad orquestrador-global --wave 5 W5g"

specialists:

  # Plan Architect (THE ONE CREATE per EPIC-PLAN-ARCHITECT)
  plan-architect:
    id: plan-architect
    tier: orchestrator
    plan_only: true
    expertise: [orchestration, plan-synthesis, multi-phase-pipeline, IDS-decisions, FMEA-risk]
    frameworks: [MEGABRAIN-composition, IDS-G1, CPM, ADR-PA-001-defaults, CRDF-1.0]
    best_for: [emit-orchestration-plan, dag-construction, cost-estimation, handoff-rendering]
    commands: ["@orquestrador-global--plan-architect", "/orquestrador-global"]
    note: "Entry-point único do squad. plan_only=true (NEVER executes — only emits plans)."

  # Intent Classification (renamed from classificador-intencao in PA-1.x)
  intent-parser:
    id: intent-parser
    tier: tier_0
    expertise: [nlp, intent-classification, entity-extraction, elicitation]
    frameworks: [intent-taxonomy, confidence-scoring, elicitation-framework]
    best_for: [classificar-solicitacoes, extrair-entidades, perguntar-quando-confidence-baixa]
    legacy_aliases: [classificador-intencao]

  # Capability Discovery (renamed from indexador-squads in PA-1.x)
  capability-cartographer:
    id: capability-cartographer
    tier: tier_0
    expertise: [capability-mapping, registry-scanning, IDS-search]
    frameworks: [capability-taxonomy, scan-capabilities-script]
    best_for: [descobrir-capabilities, ranquear-squads, capability-cache]
    legacy_aliases: [indexador-squads]
    deterministic_helper: scripts/scan-capabilities.js

  # Routing Decisions (unchanged)
  roteador:
    id: roteador
    tier: tier_1
    expertise: [routing, matching, scoring, decision-making, IDS-classification]
    frameworks: [routing-algorithm, threshold-system, IDS-G1-G6]
    best_for: [rotear-solicitacoes, calcular-match, IDS-decisions]
    commands: ["*rotear"]

  # System Supervision (unchanged)
  supervisor-sistema:
    id: supervisor-sistema
    tier: tier_1
    expertise: [monitoring, escalation, quality-assurance, blind-spot-audit]
    frameworks: [supervision-protocol, escalation-matrix, blind-spot-detection-framework]
    best_for: [monitorar-execucao, escalar-problemas, audits, blind-spot-detection]
    commands: ["*supervisionar", "*escalar"]

  # DAG Architect (renamed from team-coordinator in PA-1.x)
  dag-architect:
    id: dag-architect
    tier: tier_2
    plan_only: true
    expertise: [dag-construction, CPM, FMEA-risk, parallel-grouping]
    frameworks: [agent-teams-api, team-patterns, model-strategy, CPM-critical-path, FMEA-RPN]
    best_for: [build-dag, identify-parallel-groups, risk-fmea-per-node]
    legacy_aliases: [team-coordinator]
    deterministic_helpers: [scripts/validate-plan.js, scripts/render-plan.js]

  # Executor Coverage (added in PA-1.x — placeholder for executor types validation)
  _executor-coverage:
    id: _executor-coverage
    tier: tier_2
    expertise: [executor-classification, megabrain-type-validation]
    best_for: [validate-executor-coverage]
    note: "Underscore prefix indicates placeholder/utility agent. May be merged into supervisor-sistema in future."

# Workflow chain (post-PA-6.1):
workflow:
  L1_intent: intent-parser
  L2_capabilities: capability-cartographer
  L3_routing: roteador
  L4_dag: dag-architect
  L5_governance: "validate-plan.js → estimate-cost.js → render-plan.js → audit-plan.js (deterministic scripts)"
  L6_handoff: plan-architect

routing_matrix:
  classificacao: intent-parser
  capability_discovery: capability-cartographer
  roteamento: roteador
  supervisao: supervisor-sistema
  dag_construction: dag-architect
  plan_emission: plan-architect

global_commands:
  "/orquestrador-global": "Plan-architect entry point — emits orchestration plan (NEVER executes)"
  "@orquestrador-global--plan-architect": "Same as /orquestrador-global (Claude Code subagent invocation)"
  "/megabrain-orquestrador-global--plan-architect": "Same (Gemini CLI invocation)"

