  difficulty: basic
  atomic_layer: Molecule

name: five-whys-root-cause
title: "5 Whys — Análise de Causa Raiz"
description: >
  Técnica rápida de análise de causa raiz: para cada problema, perguntar
  "por quê?" 5 vezes consecutivas. Simples mas poderosa — evita tratar
  sintomas em vez de causas. Pode ser usada standalone ou como etapa
  dentro do DMAIC (Stage 3: Analyze) ou A3 (seção 4: Análise).

metadata:
  created_at: "2026-03-19"
  updated_at: "2026-03-19"
  version: "1.0.0"
  maturity_stage: "0-1"
  ontology_layer: "melhoria"
  estimated_time: "20-30 minutos"
  model: haiku
  framework_origin: "Toyota Production System (Taiichi Ohno)"
  research_ref: "01-analyst-research.md §2.2.3"

inputs:
  required:
    - name: problema
      type: string
      description: "Descrição objetiva do problema observado"
  optional:
    - name: dados
      type: object
      description: "Dados quantitativos que evidenciam o problema"
    - name: contexto
      type: string
      description: "Contexto em que o problema ocorreu"

outputs:
  primary:
    - name: root_cause_analysis
      type: document
      format: markdown
      description: "Análise 5 Whys com causa raiz e contramedida proposta"

steps:
  - id: 1
    name: "Definir o Problema"
    actions:
      - "Descrever o problema de forma observável e mensurável"
      - "Evitar: 'o sistema não funciona'. Preferir: 'CVR caiu de 3.2% para 1.8% nos últimos 30 dias'"
      - "Quando possível, incluir dados que evidenciam o problema"

  - id: 2
    name: "Cadeia de 5 Whys"
    actions:
      - "Perguntar 'Por que isso aconteceu?' para o problema"
      - "Para cada resposta, perguntar 'Por que?' novamente"
      - "Continuar até chegar a uma causa que é acionável (controlável)"
      - "Se bifurcar (múltiplas respostas), seguir a mais impactante"
      - "Mínimo 5 níveis, máximo 7 (parar quando chegar em algo acionável)"

  - id: 3
    name: "Validação e Contramedida"
    actions:
      - "Validar a root cause: 'Se corrigirmos isso, o problema realmente para?'"
      - "Propor contramedida específica para a root cause"
      - "Classificar contramedida: preventiva (evita recorrência) ou corretiva (corrige agora)"

output_template: |
  # 5 Whys — {problema}

  **Data:** {YYYY-MM-DD}
  **Problema:** {descrição com dados}

  ## Cadeia de Análise

  | Nível | Pergunta | Resposta |
  |-------|---------|----------|
  | Problema | {o que aconteceu?} | {descrição} |
  | Por quê 1? | {por que o problema ocorreu?} | {resposta} |
  | Por quê 2? | {por que a resposta 1?} | {resposta} |
  | Por quê 3? | {por que a resposta 2?} | {resposta} |
  | Por quê 4? | {por que a resposta 3?} | {resposta} |
  | Por quê 5? | {por que a resposta 4?} | **ROOT CAUSE: {resposta}** |

  ## Causa Raiz
  **{causa raiz identificada}**

  ## Contramedida Proposta
  - **Ação:** {o que fazer}
  - **Tipo:** {preventiva | corretiva}
  - **Responsável:** {quem}
  - **Prazo:** {quando}

  ## Validação
  > "Se implementarmos esta contramedida, o problema original será resolvido?"
  > Resposta: {sim/parcialmente — se parcial, quais causas adicionais?}

quality_gate:
  checks:
    - name: "5 níveis de profundidade"
      severity: HIGH
      criterion: "Mínimo 5 perguntas 'por quê?' respondidas"
    - name: "Causa raiz acionável"
      severity: CRITICAL
      criterion: "A root cause é algo que pode ser corrigido (controlável)"
    - name: "Contramedida definida"
      severity: HIGH
      criterion: "Ação com responsável e prazo"

integration:
  triggers_from:
    - workflow: "dmaic-correction-pipeline"
      when: "Stage 3 (Analyze) precisa de root cause analysis"
    - task: "a3-problem-solving"
      when: "Seção 4 (Análise) do A3"
    - "Qualquer agente que encontre um problema recorrente"
  feeds_into:
    - task: "a3-problem-solving"
      when: "Root cause identificada precisa de plano de ação estruturado"
    - workflow: "dmaic-correction-pipeline"
      when: "Root cause complexa precisa de DMAIC completo"
