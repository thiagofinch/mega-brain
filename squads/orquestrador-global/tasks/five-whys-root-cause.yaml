# =============================================================================
# TASK: FIVE WHYS ROOT CAUSE ANALYSIS
# =============================================================================
# Framework: Toyota 5 Whys (Taiichi Ohno)
# Para cada problema, perguntar "por quê?" 5 vezes até a root cause
# Referência: 01-analyst-research.md §2.2.3
# =============================================================================


