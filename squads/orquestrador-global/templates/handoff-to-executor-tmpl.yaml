# Consumer: PA-6.1 (plan-architect handoff section), executores downstream (@dev, @qa, @devops, etc.)
# Purpose: Passa o plano (ou slice dele) ao próximo agente que vai executar
# NOTE: plan-architect NUNCA executa — handoff é o ponto de transferência

schema_version: "1.0"

handoff_id: ""                   # {plan_id}-handoff-{NN}
plan_id: ""                      # FK para orchestration-plan
created_at: ""

executor_agent: ""               # @dev | @qa | @devops | etc.
executor_squad: null             # opcional se squad-level handoff

dag_slice:
  nodes_to_execute: []           # IDs dos nós dentro do plano
  scope: "full | partial"        # full = todo o DAG; partial = subset
  rationale: ""                  # por que esse slice agora

authorization:
  approved_by: ""                # operator | @po | etc.
  approved_at: ""
  approval_signal: ""            # explicit text / story comment / etc.

constraints:
  - type: ""                     # budget | time | scope | safety
    rule: ""                     # texto da restrição
    enforcement: ""              # blocking | warn | advisory

rollback_path:
  trigger_conditions: []
  rollback_steps: []
  recovery_owner: ""

post_execution_action:
  report_to: ""                  # @po | operator | next agent
  artifact_to_produce: ""        # ex: dev-completion-report.md
  next_handoff: null             # null se terminal; senão objeto handoff

audit:
  created_by: "plan-architect"
  source_plan: ""

_example:
  schema_version: "1.0"
  handoff_id: "sop-onboarding-cliente-20260428-1500-handoff-01"
  plan_id: "sop-onboarding-cliente-20260428-1500"
  created_at: "2026-04-28T15:30:00Z"

  executor_agent: "@dev"
  executor_squad: "megabrain-sop"

  dag_slice:
    nodes_to_execute: ["n1", "n2"]
    scope: "full"
    rationale: "Plan tem 2 nós, ambos sequenciais, executar tudo de uma vez"

  authorization:
    approved_by: "operator"
    approved_at: "2026-04-28T15:25:00Z"
    approval_signal: "user said 'GO' in chat"

  constraints:
    - type: "scope"
      rule: "SOP não pode incluir info de outros businesses (sua-empresa only)"
      enforcement: "blocking"
    - type: "time"
      rule: "Wall-time esperado < 1h"
      enforcement: "advisory"

  rollback_path:
    trigger_conditions:
      - "SOP audit FAIL após 3 iterações"
      - "Custo real > 2x estimado"
    rollback_steps:
      - "rm sop-draft.md sop-audit.md sop-final.md"
      - "Notify @po (sua-empresa)"
    recovery_owner: "@dev"

  post_execution_action:
    report_to: "@po"
    artifact_to_produce: "outputs/megabrain-sop/sua-empresa/sop-onboarding-final.md"
    next_handoff: null

  audit:
    created_by: "plan-architect"
    source_plan: "sop-onboarding-cliente-20260428-1500"
