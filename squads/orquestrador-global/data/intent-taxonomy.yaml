# ───────────────────────────────────────────────────────────────────────────────
# Complexity — escala estruturada per blueprint §9
# ───────────────────────────────────────────────────────────────────────────────
complexity_levels:
  - id: low
    label: SIMPLE
    indicators: ["single squad", "single BU", "< 4h estimate", "no novel tech", "reversível"]
  - id: medium
    label: STANDARD
    indicators: ["single BU", "1-2 dias", "padrão conhecido", "gates standard"]
  - id: high
    label: COMPLEX
    indicators: ["multi-BU OR multi-domain", "> 3 dias", "novel patterns", "pre-mortem desejável"]
  - id: critical
    label: CRITICAL
    indicators: ["cross-BU + legal/compliance", "> 1 semana", "irreversibilidade alta", "RPN_max > 300"]

# ───────────────────────────────────────────────────────────────────────────────
# Urgency — pressão temporal
# ───────────────────────────────────────────────────────────────────────────────
urgency_levels:
  - id: low
    label: "Sem urgência específica"
  - id: normal
    label: "Prazo padrão"
  - id: high
    label: "Janela apertada (< 7d)"
  - id: critical
    label: "Imediato (< 24h) ou incidente em produção"

# ───────────────────────────────────────────────────────────────────────────────
