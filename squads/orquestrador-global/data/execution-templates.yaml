# Execution Templates — orquestrador-global
# Templates for common multi-squad execution patterns
# Version: 2.0.0 | Created: 2026-03-11 | Updated: 2026-04-04
# Post-absorption: 12 templates covering 76 squads

# ─────────────────────────────────────────────────────────────────────────────
# USAGE
# ─────────────────────────────────────────────────────────────────────────────
# 1. Find the template matching your demand type
# 2. Copy the template and fill in the variables
# 3. Create execution log: .data/executions/{YYYY-MM-DD}_{slug}/
# 4. Write 00-master-plan.md using the template structure
# 5. Follow wave sequence, applying stage gates at each wave boundary
# ─────────────────────────────────────────────────────────────────────────────

templates:

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 1: CONTENT PIPELINE
  # Use when: Single piece of content or content batch production
  # Examples: "Cria VSL para MPG", "Escreve sequencia de emails de lancamento"
  # ─────────────────────────────────────────────────────────────────────────
  content_pipeline:
    name: "Content Production Pipeline"
    description: "Single-type content production — copy, video, email, or social"
    scale: "SMALL"
    estimated_duration: "2-4 hours"
    stage_gate_required: false
    log_required: false  # Single-squad demands below 4 hours skip logging

    squads_involved:
      wave_1:
        squads:
          - id: "copy"
            condition: "if demand is copy (VSL, email, ad copy, landing page)"
          - id: "content-ecosystem"
            condition: "if demand is organic content (posts, YouTube scripts)"
          - id: "video-production"
            condition: "if demand is video asset"
        parallel: false
        gate_after: false

    handoffs:
      - from: "user"
        to: "primary_squad"
        required_inputs:
          - "product (which of the 11 products)"
          - "format (VSL, email, post, video, etc.)"
          - "audience (cold, warm, hot)"
          - "deadline"

    success_criteria:
      - "Content matches brief requirements"
      - "Portuguese accent compliance verified"
      - "Naming convention applied"
      - "Copy consistency review passed (if applicable)"

    deliverables_location: "Delivered inline or as .md file in context"

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 2: FUNNEL CREATION
  # Use when: Full funnel needs to be built or rebuilt
  # Examples: "Cria funil completo para GPO", "Rebuild MPG funnel with new design"
  # ─────────────────────────────────────────────────────────────────────────
  funnel_creation:
    name: "Funnel Creation Pipeline"
    description: "Full funnel: copy + design + visual assets"
    scale: "MEDIUM"
    estimated_duration: "6-12 hours"
    stage_gate_required: true
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_funil-{sigla}"

    squads_involved:
      wave_1:
        name: "Brief + Copy"
        squads:
          - id: "copy"
            tasks:
              - "Landing page copy (headline, subheadline, body, CTAs)"
              - "Upsell/downsell copy (if applicable)"
              - "Thank-you page copy"
              - "OTO copy (if applicable)"
        parallel: false
        gate_after: true
        gate_description: "Review copy before building HTML"

      wave_2:
        name: "Design + Build"
        squads:
          - id: "funnel-creator"
            tasks:
              - "HTML landing page"
              - "Upsell/OTO page"
              - "Thank-you page"
            depends_on: ["copy"]
          - id: "creative-studio"
            tasks:
              - "Hero image"
              - "Product mockup"
              - "CTA button graphics (if custom)"
            depends_on: ["copy"]  # needs headlines
        parallel: true
        gate_after: true
        gate_description: "Review full funnel before connecting to traffic"

      wave_3:
        name: "Tracking + Launch"
        squads:
          - id: "traffic-squad"
            tasks:
              - "UTM parameter configuration"
              - "Pixel firing verification"
              - "Preview deploy check"
            depends_on: ["funnel-creator", "creative-studio"]
        parallel: false
        gate_after: false

    handoffs:
      - from: "user"
        to: "copy"
        required_inputs:
          - "product (sigla, price, Hotmart offer ID)"
          - "target audience segment"
          - "funnel structure (FE + OTO? FE only? with downsell?)"
          - "campaign context (cold traffic? launch? retargeting?)"
      - from: "copy"
        to: "funnel-creator"
        required_outputs:
          - "Complete copy for all pages"
          - "CTA button text for each page"
          - "Page structure notes"
      - from: "copy"
        to: "creative-studio"
        required_outputs:
          - "Headline and sub-headline"
          - "Brand tone direction"
          - "Visual concept notes"

    success_criteria:
      - "All pages render correctly on mobile and desktop"
      - "Hotmart checkout link is correct for the offer"
      - "UTM parameters are configured"
      - "Portuguese accent compliance on all pages"
      - "Copy consistency review passed (no price discrepancies)"
      - "Preview deployed and user-approved before traffic"

    deliverables_location: "docs/funil-{sigla}/"

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 3: CAMPAIGN LAUNCH
  # Use when: Launching or reactivating a paid media campaign
  # Examples: "Launch Meta Ads for MPG", "Start Google Ads campaign for GPO"
  # ─────────────────────────────────────────────────────────────────────────
  campaign_launch:
    name: "Paid Campaign Launch Pipeline"
    description: "Ad copy + creatives + campaign setup + tracking verification"
    scale: "MEDIUM"
    estimated_duration: "4-8 hours"
    stage_gate_required: true
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_campanha-{sigla}-{platform}"

    squads_involved:
      wave_1:
        name: "Strategy + Brief"
        squads:
          - id: "traffic-squad"
            tasks:
              - "Campaign objective selection"
              - "Audience strategy"
              - "Budget recommendation"
              - "Creative brief for creative-studio"
          - id: "conselho"
            condition: "optional — for campaigns > R$5000/month or strategic decisions"
            tasks:
              - "Campaign strategy review"
        parallel: true
        gate_after: true
        gate_description: "Confirm strategy before investing in creative production"

      wave_2:
        name: "Copy + Creative Production"
        squads:
          - id: "copy"
            tasks:
              - "Primary text (3-5 variants)"
              - "Headlines (3-5 variants)"
              - "Descriptions"
            depends_on: ["traffic-squad"]
          - id: "creative-studio"
            tasks:
              - "Static ad images (3-5 concepts)"
              - "Stories variants"
              - "Carousel (if applicable)"
            depends_on: ["copy"]  # needs headlines and CTAs
        parallel: false  # copy first, then creative
        gate_after: true
        gate_description: "User approval of creatives before upload"

      wave_3:
        name: "Campaign Setup + QA"
        squads:
          - id: "megabrain-ads"
            tasks:
              - "Campaign structure setup (PAUSED)"
              - "Ad set targeting configuration"
              - "Creative upload and association"
              - "Pixel and tracking verification"
              - "UTM parameter setup"
            depends_on: ["copy", "creative-studio"]
        parallel: false
        gate_after: true
        gate_description: "Final review before campaign activation"

      wave_4:
        name: "Activation"
        squads:
          - id: "megabrain-ads"
            tasks:
              - "Campaign activation (ads -> ad sets -> campaigns)"
              - "First 24h monitoring setup"
        parallel: false
        gate_after: false

    handoffs:
      - from: "user"
        to: "traffic-squad"
        required_inputs:
          - "product (sigla + Hotmart offer)"
          - "campaign objective (ROAS? CPA? CPL?)"
          - "monthly budget"
          - "target audience segment"
          - "destination URL (funnel page)"
      - from: "traffic-squad"
        to: "copy"
        required_outputs:
          - "Campaign objective and funnel stage"
          - "Target audience profile"
          - "Key messages to emphasize"
          - "CTA direction"
      - from: "copy"
        to: "creative-studio"
        required_outputs:
          - "All copy variants"
          - "Visual direction notes"
          - "Placement specifications"

    success_criteria:
      - "Campaign created in PAUSED status initially"
      - "All tracking pixels firing correctly"
      - "UTM parameters following naming convention"
      - "At least 3 ad variants per ad set"
      - "Budget set at correct daily amount (in centavos for API)"
      - "User approved creatives before launch"

    deliverables_location: "Campaign live in ads platform + copy files in context"

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 4: PRODUCT LAUNCH
  # Use when: Full product launch campaign (7-14 day launch cycle)
  # Examples: "Launch MCPM with CPL + VSL", "Mini-launch for new GPO price"
  # ─────────────────────────────────────────────────────────────────────────
  product_launch:
    name: "Product Launch Campaign"
    description: "Full launch: strategy + content + funnel + email + ads + live events"
    scale: "LARGE"
    estimated_duration: "2-5 days"
    stage_gate_required: true
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_lancamento-{sigla}"

    squads_involved:
      wave_1:
        name: "Strategy + Planning"
        squads:
          - id: "conselho"
            tasks:
              - "Launch strategy review"
              - "Positioning recommendation"
              - "Offer analysis"
          - id: "erico-rocha"
            tasks:
              - "CPL structure design"
              - "Launch sequence planning"
              - "Webinar/live strategy"
        parallel: true
        gate_after: true
        gate_description: "Strategy gate — confirm launch plan before execution"

      wave_2:
        name: "Core Asset Production"
        squads:
          - id: "copy"
            tasks:
              - "VSL script"
              - "Launch email sequence (7-10 emails)"
              - "Landing page copy"
              - "Upsell/downsell copy"
              - "WhatsApp launch sequence"
            depends_on: ["conselho", "erico-rocha"]
          - id: "infoproduct-creation"
            condition: "if new or updated product content is needed"
            tasks:
              - "Course module updates"
              - "New bonus content"
            depends_on: []
        parallel: true
        gate_after: false

      wave_3:
        name: "Visual + Technical Production"
        squads:
          - id: "creative-studio"
            tasks:
              - "Launch creatives (ads, social, email headers)"
              - "VSL cover image"
              - "Bonus product mockups"
            depends_on: ["copy"]
          - id: "funnel-creator"
            tasks:
              - "Launch landing page"
              - "Checkout page"
              - "Upsell page"
              - "Thank-you/members page"
            depends_on: ["copy"]
          - id: "marketing-automation"
            tasks:
              - "Email sequence setup in ActiveCampaign"
              - "WhatsApp sequence setup in n8n/WAHA"
              - "Tag-based automation flows"
            depends_on: ["copy"]
        parallel: true
        gate_after: true
        gate_description: "Pre-launch QA gate — all assets ready?"

      wave_4:
        name: "Pre-Launch Setup"
        squads:
          - id: "megabrain-ads"
            tasks:
              - "Paid campaign structure setup"
              - "Retargeting campaign setup"
              - "Tracking verification"
            depends_on: ["creative-studio", "funnel-creator"]
          - id: "youtube-lives"
            tasks:
              - "Live event briefing"
              - "StreamYard/platform setup"
              - "Notification scheduling"
            depends_on: ["copy"]
          - id: "content-ecosystem"
            tasks:
              - "Launch organic content calendar"
              - "Social posts (pre-launch + launch week)"
            depends_on: ["copy"]
        parallel: true
        gate_after: true
        gate_description: "Launch readiness gate — confirm all systems go"

      wave_5:
        name: "Launch Execution + Monitoring"
        squads:
          - id: "megabrain-ads"
            tasks:
              - "Campaign activation"
              - "Daily performance monitoring"
              - "Bid and budget optimization"
          - id: "data-analytics"
            tasks:
              - "Daily launch report"
              - "Conversion tracking validation"
        parallel: true
        gate_after: false

    success_criteria:
      - "All assets QA'd and approved before launch"
      - "Email sequence live and tested (test send sent)"
      - "Landing page preview-deployed and approved"
      - "Paid campaigns in PAUSED status, ready to activate"
      - "YouTube live briefing complete"
      - "Tracking and pixels verified"
      - "Launch day runbook exists"

    deliverables_location: "docs/funil-{sigla}/ + campaign in ads platform + sequences in AC"

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 5: STRATEGIC REVIEW
  # Use when: Major decisions, quarterly reviews, positioning analysis
  # Examples: "Review which products to prioritize for Q2", "Analyze if we should enter TikTok"
  # ─────────────────────────────────────────────────────────────────────────
  strategic_review:
    name: "Strategic Review Session"
    description: "Analysis + advisory for major business decisions"
    scale: "SMALL"
    estimated_duration: "2-4 hours"
    stage_gate_required: false
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_revisao-estrategica-{topic}"

    squads_involved:
      wave_1:
        name: "Research + Data"
        squads:
          - id: "market-research"
            tasks:
              - "Market landscape analysis"
              - "Competitive positioning review"
          - id: "data-analytics"
            tasks:
              - "Performance data synthesis"
              - "KPI trend analysis"
          - id: "deep-scraper"
            condition: "if competitive intelligence needed"
            tasks:
              - "Competitor analysis"
        parallel: true
        gate_after: false

      wave_2:
        name: "Advisory"
        squads:
          - id: "conselho"
            tasks:
              - "Strategic question analysis"
              - "Advisory board perspectives"
              - "Recommendation synthesis"
            depends_on: ["market-research", "data-analytics"]
        parallel: false
        gate_after: false

    success_criteria:
      - "Decision question clearly answered"
      - "Recommendation includes rationale"
      - "Next action items identified"
      - "Session saved to SuperMemory (containerTag: conselho)"

    deliverables_location: ".data/executions/{dir}/99-execution-summary.md"

  # ═══════════════════════════════════════════════════════════════════════════
  # NEW TEMPLATES (6-12) — Added 2026-04-04 for Epic 110
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 6: BRAND CREATION
  # Use when: Creating a brand from scratch for a new business/workspace
  # Examples: "Criar marca para clinica de estetica", "Brand nova para skincare natural"
  # Ref: squad-collaboration-scenarios.md Scenario 2
  # ─────────────────────────────────────────────────────────────────────────
  brand_creation:
    name: "Brand Creation Pipeline"
    description: "Full brand creation: discovery, naming, identity, visual system, go-to-market"
    scale: "LARGE"
    estimated_duration: "3-7 days"
    stage_gate_required: true
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_brand-{slug}"

    squads_involved:
      wave_1:
        name: "Discovery + Intelligence"
        squads:
          - id: "c-level"
            tasks:
              - "Founder vision elicitation"
              - "Business model canvas"
              - "Target market definition"
          - id: "mega-brain"
            tasks:
              - "Founder DNA extraction (MCE pipeline)"
              - "Knowledge graph of expertise"
          - id: "market-research"
            tasks:
              - "TAM/SAM analysis"
              - "Blue Ocean Canvas"
              - "ICP definition"
          - id: "deep-scraper"
            tasks:
              - "Competitor scraping (pricing, positioning, messaging)"
              - "Market landscape data"
        parallel: true
        gate_after: true
        gate_description: "Discovery gate — validate market opportunity before brand investment"

      wave_2:
        name: "Brand Foundation"
        squads:
          - id: "brand"
            tasks:
              - "Brand naming (SNP process)"
              - "Verbal identity (E/Faz/Fala)"
              - "Brand positioning statement"
              - "Brand archetype selection"
            depends_on: ["c-level", "mega-brain", "market-research"]
          - id: "movement"
            tasks:
              - "Ideological marketing N1-N4"
              - "Brand phenomenon design"
              - "Community narrative"
            depends_on: ["c-level", "mega-brain"]
          - id: "storytelling"
            tasks:
              - "Brand origin story"
              - "Story of Self/Us/Now"
              - "Monomito adaptation"
            depends_on: ["c-level", "mega-brain"]
          - id: "advisory-board"
            tasks:
              - "Strategic validation (Munger, Thiel perspectives)"
              - "Risk assessment of positioning"
            depends_on: ["market-research"]
        parallel: true
        gate_after: true
        gate_description: "Brand identity gate — approve name, positioning, narrative before visual design"

      wave_3:
        name: "Visual Identity"
        squads:
          - id: "design-system"
            tasks:
              - "Brand tokens (colors, typography, spacing)"
              - "Brandbook generation"
              - "Component system foundation"
            depends_on: ["brand"]
          - id: "face-forge"
            tasks:
              - "Brand avatar/mascot generation"
              - "Founder portrait suite"
              - "Style DNA extraction"
            depends_on: ["brand"]
          - id: "visual-knowledge-squad"
            tasks:
              - "Brand canvas"
              - "Experience map"
              - "Visual identity map"
            depends_on: ["brand", "storytelling"]
          - id: "creative-studio"
            tasks:
              - "Social media templates"
              - "Ad creative templates"
              - "Packaging concepts (if applicable)"
            depends_on: ["design-system"]
        parallel: true
        gate_after: true
        gate_description: "Visual identity gate — approve brandbook and assets before go-to-market"

      wave_4:
        name: "Go-to-Market Preparation"
        squads:
          - id: "client-strategy"
            tasks:
              - "Launch roadmap"
              - "OKR definition"
              - "First 90-day plan"
            depends_on: ["brand", "market-research"]
          - id: "funnel-creator"
            tasks:
              - "Entry funnel architecture (quiz/tripwire)"
              - "Page wireframes"
            depends_on: ["brand", "design-system"]
          - id: "copy"
            tasks:
              - "Messaging guide"
              - "Headlines and taglines bank"
              - "Email welcome sequence"
            depends_on: ["brand", "storytelling"]
          - id: "seo"
            tasks:
              - "Domain authority foundation"
              - "Keyword strategy"
              - "Meta content templates"
            depends_on: ["brand", "copy"]
          - id: "legal"
            tasks:
              - "Brand trademark registration"
              - "Terms of service draft"
              - "LGPD privacy policy"
            depends_on: ["brand"]
        parallel: true
        gate_after: false

    handoffs:
      - from: "user"
        to: "c-level"
        required_inputs:
          - "Business type and niche"
          - "Founder background and expertise"
          - "Target market vision"
          - "Budget range"
      - from: "brand"
        to: "design-system"
        required_outputs:
          - "Brand name and tagline"
          - "Brand archetype"
          - "Color mood direction"
          - "Verbal identity guide"
      - from: "design-system"
        to: "creative-studio"
        required_outputs:
          - "Complete brandbook"
          - "Token system (CSS vars)"
          - "Typography selections"

    success_criteria:
      - "Brand name validated (domain available, no trademark conflicts)"
      - "Brandbook complete with tokens, typography, color system"
      - "Visual assets for all primary channels created"
      - "Messaging guide with 10+ approved headlines"
      - "Entry funnel wireframed and copy-ready"
      - "LGPD privacy policy drafted"
      - "All assets saved to SuperMemory (containerTag: brand)"

    deliverables_location: "outputs/brand/{slug}/ + workspace/businesses/{slug}/L1-strategy/"

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPLATE 7: COURSE CREATION
  # Use when: Transforming expert knowledge into a complete online course
  # Examples: "Curso de drenagem linfatica", "Programa completo de um nicho de saúde"
  # Ref: squad-collaboration-scenarios.md Scenario 4
  # ─────────────────────────────────────────────────────────────────────────
  course_creation:
    name: "Course Creation Pipeline"
    description: "Full course: knowledge extraction, instructional design, production, platform, sales"
    scale: "LARGE"
    estimated_duration: "5-14 days"
    stage_gate_required: true
    log_required: true
    log_dir_pattern: "{YYYY-MM-DD}_curso-{slug}"

    squads_involved:
      wave_1:
        name: "Knowledge Extraction"
        squads:
          - id: "mega-brain"
            tasks:
              - "MCE pipeline: transcriptions -> 10-layer DNA"
              - "Knowledge graph construction"
              - "Expert mental model extraction"
          - id: "kb"
            tasks:
              - "Mind mapping: 9 cognitive layers"
              - "Capture expert decision patterns"
          - id: "fathom-analysis"
            tasks:
              - "Student call analysis -> gaps, doubts, language"
              - "VoC bank from existing students"
          - id: "etl-ops"
            tasks:
              - "Video transcription pipeline"
              - "PDF/document processing"
              - "Content chunking and indexing"
          - id: "academic-research"
            tasks:
              - "Scientific validation of course content"
              - "Evidence base for methodology claims"
        parallel: true
        gate_after: true
        gate_description: "Knowledge gate — validate extraction completeness before design"

      wave_2:
        name: "Instructional Design"
        squads:
          - id: "course-creator"
            tasks:
              - "Module structure and learning paths"
              - "Assessment design (quizzes, practical exercises)"
              - "Gamification elements"
              - "Learning outcome mapping"
            depends_on: ["mega-brain", "kb", "fathom-analysis"]
          - id: "infoproduct-creation"
            tasks:
              - "Product stack design (tiers, pricing, bonuses)"
              - "Student success metrics"
              - "Community structure"
            depends_on: ["mega-brain"]
          - id: "sop-factory"
            tasks:
              - "SOPs for processes taught in the course"
              - "Step-by-step guides (dual output: human + AI)"
            depends_on: ["mega-brain", "kb"]
          - id: "tools-squad"
            tasks:
              - "Student frameworks and checklists"
              - "Decision tools for practical application"
            depends_on: ["mega-brain"]
        parallel: true
        gate_after: true
        gate_description: "Design gate — approve module structure and product stack before production"

      wave_3:
        name: "Content Production"
        squads:
          - id: "content-ecosystem"
            tasks:
              - "Lesson scripts"
              - "Complementary content (blog posts, social)"
            depends_on: ["course-creator"]
          - id: "video-production"
            tasks:
              - "AI video generation for lessons"
              - "Editing, subtitles, effects"
            depends_on: ["course-creator", "content-ecosystem"]
          - id: "slides-creator"
            tasks:
              - "Lesson slides (andragogic design)"
              - "Summary slides per module"
            depends_on: ["course-creator"]
          - id: "visual-knowledge-squad"
            tasks:
              - "Visual learning maps"
              - "Canvas per module"
              - "Infographics"
            depends_on: ["course-creator"]
          - id: "design-system"
            tasks:
              - "Course visual identity"
              - "Consistent branding across materials"
            depends_on: ["infoproduct-creation"]
          - id: "translate"
            condition: "if multilanguage version required"
            tasks:
              - "Spanish/English translation"
              - "Cultural adaptation"
            depends_on: ["content-ecosystem"]
        parallel: true
        gate_after: true
        gate_description: "Production gate — review all content quality before platform setup"

      wave_4:
        name: "Platform + Sales"
        squads:
          - id: "full-stack-dev"
            tasks:
              - "Members area setup"
              - "Quiz/diagnostic integration"
              - "Progress tracking"
            depends_on: ["course-creator", "design-system"]
          - id: "funnel-creator"
            tasks:
              - "Sales funnel architecture"
              - "Landing page and checkout"
            depends_on: ["infoproduct-creation"]
          - id: "copy"
            tasks:
              - "Sales page copy"
              - "Email launch sequence"
              - "WhatsApp nurturing"
            depends_on: ["infoproduct-creation", "fathom-analysis"]
          - id: "hormozi"
            tasks:
              - "Offer stack validation (Grand Slam Offer)"
              - "Pricing strategy"
              - "Guarantee design"
            depends_on: ["infoproduct-creation"]
        parallel: true
        gate_after: false

    handoffs:
      - from: "user"
        to: "mega-brain"
        required_inputs:
          - "Expert name and domain"
          - "Source materials (videos, books, transcripts)"
          - "Target student profile"
          - "Course scope and depth"
      - from: "course-creator"
        to: "content-ecosystem"
        required_outputs:
          - "Complete module structure"
          - "Learning outcomes per lesson"
          - "Content type per lesson (video, text, exercise)"
      - from: "infoproduct-creation"
        to: "copy"
        required_outputs:
          - "Product name and positioning"
          - "Pricing tiers"
          - "Bonus descriptions"
          - "Target student pain points"

    success_criteria:
      - "All modules have complete content (video + slides + exercises)"
      - "Assessments validate learning outcomes"
      - "Members area functional and tested"
      - "Sales funnel live with correct checkout links"
