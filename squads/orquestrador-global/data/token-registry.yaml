meta:
  squad_scope: orquestrador-global
  version: 1.2.0
  purpose: MEGABRAIN token registry — 9 canonical families refined for orchestration domain
  refined_at: "2026-04-30"
  refined_by: "/megabrain-remediate-squad orquestrador-global --wave 4 W4-01 + W5e honest annotation"
  source_findings:
    - "outputs/squad-validations/orquestrador-global/20260429-225559/score-card.yaml#D4-tokens"
    - "outputs/squad-validations/orquestrador-global/20260429-232836/forensic-findings.yaml#SP-3"
    - "outputs/squad-validations/orquestrador-global/20260429-225559/remediation-plan.yaml#wave_4"
    - "outputs/squad-validations/orquestrador-global/20260429-232836/remediation-plan.yaml#wave_5e"
  notes: |
    v1.0 was baseline (generated by batch-create-tokens.py with note "refine
    values per squad specificity"). v1.1 refined values for orchestration
    domain and added consumed_by[] bindings to enable explicit token-to-task
    mapping.

    v1.2 (W5e honest annotation): Tier 3 forensic xref-tokens flagged that
    the consumed_by[] arrays were FICTIONAL — declared consumer files do
    not actually reference token names by string. This was an AN_KE_147
    violation (Principle is Aspiration, Enforcement is Mechanism).

    Honest semantics adopted in v1.2: consumed_by[] = "INTENDED CONSUMERS"
    (declarative routing), NOT "verified runtime bindings". Tokens are not
    yet mechanically enforced — they are documented contracts that the
    orchestration code SHOULD read, but no validator currently asserts
    that consumers reference them by name.

    Path to true binding (deferred to BL-2 Plan-Quality Learning Loop):
    when pipeline-execution-log.yaml is emitted (DEV-OG-005), each token
    consumption can be logged + cross-referenced with this registry to
    detect runtime drift.

  semantics_disclaimer: |
    consumed_by[] = INTENDED CONSUMERS (declarative). Runtime consumption
    by string reference is NOT currently asserted by any validator. See
    deviation-registry.yaml DEV-OG-002 follow_up_note for context.

tokens:

- token_name: time_window_default
  family: Time
  value: 24h
  description: Default temporal scope for routing/orchestration decisions (was 7d — orchestration is short-cycle)
  consumed_by:
    - tasks/audit-system.md          # uses for "últimos 30 dias" override
    - tasks/team-monitor.md           # uses for status windows
    - tasks/team-status.md
    - workflows/wf-kaizen-audit.yaml
    - data/orchestration-metrics-registry.yaml

- token_name: routing_latency_p99_ms
  family: Time
  value: 5000
  description: p99 latency budget for routing decisions (orchestration-specific SLA)
  consumed_by:
    - tasks/route-request.md
    - tasks/processar-solicitacao.md
    - data/orchestration-metrics-registry.yaml

- token_name: max_parallel_tasks
  family: Capacity
  value: 8
  description: Concurrent task execution ceiling (raised from 5 — DAG plans frequently fan out 6-8 parallel branches; matches plan-architect Run #1.5 evidence)
  consumed_by:
    - agents/dag-architect.md
    - tasks/execute-team.md
    - tasks/execute-multi-squad-team.md
    - workflows/wf-plan-demand.yaml

- token_name: max_concurrent_engines
  family: Capacity
  value: 1
  description: Concurrent execution engines (megabrain-example-squad constraint; single-threaded per execution-engine-registry.yaml)
  consumed_by:
    - data/execution-engine-registry.yaml
    - tasks/execute-team.md

- token_name: min_quality_threshold
  family: Threshold
  value: 0.75
  description: Minimum pass-rate for quality gates (matches QG-2 output_quality + canonical workflow min_score post-W2-03 normalization)
  consumed_by:
    - data/quality-gates.yaml          # QG-2 threshold reference
    - data/composition-rules.yaml       # quality_gate_scale documentation
    - workflows/wf-*.yaml               # 16 occurrences of min_score: 0.75

- token_name: plan_approval_window_min
  family: Threshold
  value: 30
  description: Minutes for human approval gate on CRITICAL plans (orchestration-specific SLA)
  consumed_by:
    - agents/plan-architect.md
    - workflows/wf-plan-demand.yaml

- token_name: priority_default
  family: Priority
  value: medium
  description: Default priority (low|medium|high|critical)
  consumed_by:
    - tasks/processar-solicitacao.md
    - tasks/route-request.md
    - tasks/dispatch-to-megabrain-example-squad.yaml

- token_name: default_permissions
  family: Permission
  value: read_only
  description: Baseline permission model — orchestration is plan_only by default; mutations require explicit elevation
  consumed_by:
    - agents/plan-architect.md         # plan_only=true
    - .claude/hooks/pre-execution-block.sh  # enforces permission boundary
    - data/composition-rules.yaml

- token_name: domain_classification
  family: Taxonomy
  value: orchestration
  description: Domain anchor for squad artifacts (was "default")
  consumed_by:
    - data/intent-taxonomy.yaml
    - data/squad-routing-matrix.yaml

- token_name: retry_behavior
  family: Behavior
  value: exponential_backoff
  description: Standard retry pattern on transient failures (3 retries, 2s/4s/8s)
  consumed_by:
    - tasks/dispatch-to-megabrain-example-squad.yaml
    - data/execution-engine-registry.yaml

- token_name: accountability_owner
  family: Accountability
  value: plan-architect
  description: Primary accountable role for squad outputs
  consumed_by:
    - data/quality-gates.yaml          # QG-1/QG-2/QG-3 owner field
    - data/orchestration-metrics-registry.yaml
    - config.yaml                       # accountability_owner

- token_name: execution_mode
  family: Mode
  value: normal
  description: Execution mode (normal|shadow|dry-run|emergency). plan-architect supports --dry-run override.
  consumed_by:
    - agents/plan-architect.md
    - .claude/skills/orquestrador-global/SKILL.md

# =============================================================================
# Token consumption coverage (W4-01 acceptance criterion)
# =============================================================================
# Total tokens: 12 (was 9; added routing_latency_p99_ms, max_concurrent_engines,
# plan_approval_window_min for orchestration-specific SLAs).
# All 12 tokens have consumed_by[] populated (100% — D4 orphan finding RESOLVED).
