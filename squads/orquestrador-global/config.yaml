name: orquestrador-global
version: 3.1.1
description: 'Sistema nervoso central do core. Atua como ponto de entrada central
  para todas as solicitacoes, classificando intencoes, encontrando o squad/agente
  mais adequado para cada demanda, e coordenando a criacao de novos squads quando
  necessario. Ontological maturity framework: Demanda -> Classificacao -> Orquestracao
  -> Gate Review -> Consolidacao -> Melhoria across 3 stages (0-to-1, 1-to-10, 10-to-100).'
squad_type: hub                  # Canonicalized 2026-04-30 (workspace-awareness-fix Opt B); was 'system' (non-canonical). orquestrador-global is hub-behaving meta-squad — operates across all businesses (intent classification, routing, multi-squad orchestration). Per workspace-layer-binding.yaml Rule 12 (hub-any).
