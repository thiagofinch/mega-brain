  tools: []
  scripts: []
commands:
  - name: '*help'
    description: Listar todos os squads e suas capacidades
    routes_to: capability-cartographer
  - name: '*route'
    description: Rotear solicitação para squad adequado
    routes_to: roteador
  - name: '*status'
    description: Ver status do ecossistema
    routes_to: supervisor-sistema
  - name: '*audit'
    description: Executar auditoria do sistema
    routes_to: supervisor-sistema
  - name: '*find'
    description: Buscar squad por capacidade
    routes_to: capability-cartographer
  - name: '*create-squad'
    description: Solicitar criação de novo squad
    routes_to: roteador
    forwards_to: squad-creator
  - name: '*execute-team'
    description: Executar demanda via Agent Teams
    routes_to: dag-architect
  - name: '*team-status'
    description: Status da equipe ativa
    routes_to: dag-architect
  - name: '*team-monitor'
    description: Monitorar execução da equipe
    routes_to: dag-architect
  - name: '*team-shutdown'
    description: Encerrar equipe ativa
    routes_to: dag-architect
routing:
  algorithm: domain_match + problem_match + task_type_match + keywords
  scoring:
    domain_match: 0.4
    problem_match: 0.35
    task_type_match: 0.15
    keywords: 0.1
  thresholds:
    route_direct: 0.8
    route_with_confirm: 0.6
    escalate_to_human: 0.6
    create_new_squad: <0.6 AND recurring
  fallback:
    no_match: Solicitar mais contexto ao usuário
    low_confidence: Apresentar opções para usuário escolher
    new_capability: Rotear para squad-creator
team_execution:
  enabled: true
  max_concurrent_teams: 1
  context_passing:
    method: file_based
    output_dir: .data/team-outputs
    format: markdown
  execution_logging:
    enabled: true
    rule: .claude/rules/execution-logging.md
    output_dir: .data/executions
  defaults:
    max_agents: 5
    timeout_per_task_minutes: 10
    timeout_total_minutes: 60
    auto_shutdown: true
    require_approval: true
  models:
    chief: opus-4-6
    architect: opus-4-6
    implementer: sonnet
    writer: sonnet
    reviewer: sonnet
    researcher: haiku
    classifier: haiku
    orchestrator: opus-4-6
  supported_squads:
    tier_1_full:
      - full-stack-dev
      - copywriting
      - content-ecosystem
      - deep-scraper
    tier_2_basic:
      - design-system
      - media-buy
      - youtube-lives
      - data-analytics
      - project-management-clickup
      - creative-studio
      - funnel-creator
    tier_3_experimental:
      - sales
      - community-example-squad
      - communication-example-squad
      - conselho
      - strategy-example-squad
      - core-dev
      - infoproduct-creation
      - agora-direct-response
    not_supported:
      - squad-creator
      - orquestrador-global
  staged_execution:
    enabled: true
    min_squads_for_stages: 2
    gate_options:
      - approve
      - revise
      - modify_plan
      - pause
      - cancel
  patterns:
    pipeline:
      description: Sequential stages, each agent produces input for next
      squads:
        - content-ecosystem
        - youtube-lives
        - project-management-clickup
        - funnel-creator
        - infoproduct-creation
    parallel_workers:
      description: Multiple agents doing similar work on different inputs
      squads:
        - copywriting
        - deep-scraper
        - media-buy
        - creative-studio
    builder_validator:
      description: One builds, another reviews
      squads:
        - full-stack-dev
        - design-system
        - core-dev
    competing_hypotheses:
      description: Multiple agents tackle same problem from different angles
      squads:
        - data-analytics
        - conselho
        - strategy-example-squad
    business_domain:
      description: Chief coordinates domain-specific agents
      squads:
        - sales
        - community-example-squad
        - communication-example-squad
    battle_royale:
      description: Adversarial competition with voting, debate, and board review
      squads:
        - copywriting
quality_standards:
  routing:
    - Tempo de classificação < 2 segundos
    - Precisão de roteamento > 90%
    - Taxa de escalação < 10%
  monitoring:
    - Health check a cada 5 minutos
    - Relatório de gaps semanal
    - Atualização de índice em tempo real
  fallback:
    - Sempre oferecer alternativas ao usuário
    - Nunca deixar solicitação sem resposta
    - Escalar para humano em caso de dúvida
metrics:
  tracked:
    - requests_total
    - requests_by_squad
    - routing_accuracy
    - routing_latency
    - escalation_rate
    - new_squad_requests
    - unmatched_requests
  alerts:
    - condition: routing_accuracy < 85%
      action: Notificar administrador
    - condition: unmatched_requests > 20%
      action: Sugerir criação de novo squad
integrations:
  internal_squads:
    managed:
      - academic-research
      - core-dev
      - communication-example-squad
      - community-example-squad
      - conselho
      - content-ecosystem
      - copywriting
      - creative-studio
      - data-analytics
      - deep-scraper
      - design-system
      - full-stack-dev
      - funnel-creator
      - infoproduct-creation
      - market-research
      - marketing-automation
      - media-buy
      - project-management-clickup
      - sales
      - strategy-example-squad
      - technical-documentation
      - youtube-lives
      - agora-direct-response
    special:
      - squad: squad-creator
        trigger: Quando necessário criar novo squad
        permission: exclusive
capabilities:
  core:
    - Intent classification and request routing
    - Squad discovery and capability matching
    - System health monitoring and gap analysis
    - Squad indexing and registry management
    - Agent Teams execution and coordination
    - Multi-squad staged execution with gates
    - Context passing between squads (file-based)
    - Execution logging and audit trail
tags:
  - orchestration
  - routing
  - system
  - meta
  - agent-teams
  - multi-squad
