name: orquestrador-global
version: 3.1.0
description: >
  Sistema nervoso central do core. Atua como ponto de entrada central para todas as solicitações, classificando
  intenções, encontrando o squad/agente mais adequado para cada demanda, e coordenando a criação de novos squads quando
  necessário.
squad_type: system
domain: orchestration
author: your-org
license: MIT
megabrain:
  minVersion: 2.1.0
  type: squad
metadata:
  created_at: '2026-02-01'
  updated_at: '2026-04-30'
  created_by: core
  status: active
  differentiator: ORQUESTRADOR - Central nervous system, intent classification, routing, Agent Teams, multi-squad staged execution
  special_permission: >
    Este squad é o único autorizado a rotear solicitações para outros squads e a acionar a criação de novos squads via
    squad-creator.
  note: >
    v1.0.0: Initial creation with 4 agents. v2.0.0: Added team-coordinator, Agent Teams integration, staged execution.
    v2.1.0: Migrated config.yaml -> squad.yaml (Mega Brain 2.1 format). Merged routing, team_execution, workflows, knowledge,
    commands. v2.2.0 (2026-04-30, W5g): synced post-PA-6.1 with config.yaml — entry_agent moved to plan-architect (THE ONE
    CREATE per EPIC-PLAN-ARCHITECT); components.agents updated to 7 canonical agents (was 5 pre-rename: classificador-intencao
    → intent-parser, indexador-squads → capability-cartographer, team-coordinator → dag-architect; added plan-architect
    + _executor-coverage); activation.command updated to canonical Claude Code projection; aliases preserved as legacy.
entry_agent: plan-architect              # Synced 2026-04-30 (W5g) — was 'roteador' pre-rename
slash_prefix: megabrain
activation:
  command: '@orquestrador-global--plan-architect'   # Synced 2026-04-30 (W5g) — canonical Claude Code projection
  legacy_aliases:                                    # Renamed from 'aliases' to clarify these are deprecated
    - '@plan-architect'
    - '@orquestrador'
    - '@megabrain'        # legacy from v2.0
    - '@central'     # legacy from v2.0
    - '@help'        # legacy from v2.0
components:
  agents:                                  # Synced 2026-04-30 (W5g) — 5 legacy → 7 canonical
    - plan-architect                       # entry_agent (THE ONE CREATE per EPIC-PLAN-ARCHITECT)
    - intent-parser                        # was classificador-intencao
    - capability-cartographer              # was indexador-squads
    - roteador                             # unchanged
    - supervisor-sistema                   # unchanged
    - dag-architect                        # was team-coordinator (rename + plan_only=true)
    - _executor-coverage                   # added in PA-1.x
  tasks:
    - a3-problem-solving
    - audit-system
    - basic-orchestration-setup
    - consult-chief
    - cross-squad-review
    - dispatch-to-megabrain-example-squad
    - ecosystem-health-report
    - execute-multi-squad-team
    - execute-team
    - find-capability
    - first-squad-routing
    - five-whys-root-cause
    - gate-review-framework
    - indexar-squad
    - orchestration-architecture
    - orchestration-scaling
    - processar-solicitacao
    - request-new-squad
    - route-request
    - staged-execution-design
    - team-monitor
    - team-shutdown
    - team-status
    - blind-spot-self-audit
    - route-cro-recommendation
  workflows:
    # Resync 2026-04-30 (W5g) — match filesystem (28 total: 20 yaml + 8 md).
    # Removed phantom 'processar-solicitacao' (no workflow file; only task with same name).
    # Added wf-eval-plan-architect (PA-6.2) + wf-plan-demand (PA-6.1).
    - atualizar-indice
    - auditoria-sistema
    - auto-discovery
    - battle-round
    - creative-production-request
    - cross-squad-audit-cycle
    - demand-to-delivery
    - dmaic-correction-pipeline
    - executar-com-team
