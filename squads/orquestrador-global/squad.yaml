    - self-evolution-cycle
    - wf-audience-intelligence-loop
    - wf-competitive-intel-distribution
    - wf-copy-performance-loop
    - wf-cs-digest-distribution
    - wf-eval-plan-architect          # added W5g (was missing — PA-6.2)
    - wf-fathom-digest-distribution
    - wf-funnel-cro-loop
    - wf-kaizen-audit
    - wf-plan-demand                  # added W5g (was missing — PA-6.1)
    - wf-product-quality-loop
    - wf-seo-conversion-feedback
    - wf-support-prevention
  knowledge:
    - BATTLE-ADOPTION-GUIDE
    - BATTLE-CONFIG-SCHEMA
    - BATTLE-SCORING-FRAMEWORK
    - BATTLE-TEAM-TEMPLATES
    - MODEL-STRATEGY
    - MULTI-SQUAD-PLAYBOOK
    - ORCHESTRATION-MATURITY-FRAMEWORK
