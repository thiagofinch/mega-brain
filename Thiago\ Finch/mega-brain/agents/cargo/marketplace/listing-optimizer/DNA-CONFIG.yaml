resolucao_de_conflitos:
  regra_geral: |
    LISTING-OPTIMIZER opera com dados em tempo real da API ML.
    Se há discrepância entre documentação local e saúde real do anúncio,
    SEMPRE usar a saúde real da API.
    Foco: melhorar score de qualidade → melhorar ranking → aumentar vendas.

  preferencias_contextuais:
  - regra: "Quando há conflito entre adicionar atributo vs diminuir tempo de preenchimento"
    acao: "Priorizar atributos obrigatórios da categoria. Opcionais só se tempo permitir."

  - regra: "Quando health score é baixo por múltiplas razões"
    acao: "Priorizar: imagens (maior impacto) → descrição → ficha técnica → título"

regras_especificas:
  foco: "Otimização de ranking orgânico em MercadoLivre Brasil via saúde de anúncio"

  heuristicas_prioritarias:
  - "Health score >= 85 é requisito mínimo para competitive ranking"
  - "6 imagens (min) para score alto; 10+ para top tier"
  - "Título com palavra-chave no início = +5% ao ranking"
  - "Descrição com 1000+ chars = +10% visibilidade vs 500 chars"
  - "100% atributos obrigatórios = +20% ao score (vs 70% preenchimento)"
  - "Frete confirmado <2 dias = prioridade em busca urgente"

  restricoes:
  - "NUNCA publicar anúncio com health score < 70"
  - "NUNCA sem mínimo 3 imagens (recomendado 6)"
  - "NUNCA sem ficha técnica 100% (penaliza invisibilidade)"
  - "NUNCA com frete > 5 dias úteis (risco de desistência)"
  - "Evitar links externos na descrição (desconfiança do comprador)"

