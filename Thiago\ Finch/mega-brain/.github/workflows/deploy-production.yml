name: Deploy Production to Vercel

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-production.yml"
      - "vercel.json"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build verification
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://api.example.com"
          NEXT_PUBLIC_WS_URL: "wss://api.example.com"

  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: checks
    permissions:
      statuses: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        id: vercel
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          scope: ${{ secrets.VERCEL_ORG_ID }}
          production: true

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = "${{ steps.vercel.outputs.preview-url }}";
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              required_contexts: [],
              auto_merge: false,
              description: "Production deployment via Vercel"
            });

      - name: Post deployment summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const deployment = {
              timestamp: new Date().toISOString(),
              commit: context.sha.substring(0, 7),
              author: context.actor,
              message: context.payload.head_commit?.message || 'N/A',
              status: 'deployed',
              url: '${{ steps.vercel.outputs.preview-url }}'
            };
            console.log('📦 PRODUCTION DEPLOYMENT', deployment);

  smoke-tests:
    name: Smoke Tests on Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Health check
        run: |
          PRODUCTION_URL="${{ secrets.PRODUCTION_URL }}"
          echo "Checking production health at: $PRODUCTION_URL"

          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "307" ]; then
              echo "✅ Production health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Attempt $i/5: HTTP $HTTP_CODE, retrying..."
            sleep 10
          done

          echo "❌ Production health check failed"
          exit 1

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: always()

    steps:
      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Production Deployment Successful*\n\nCommit: `${{ github.sha }}`\nBranch: `main`\nDeployed by: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Production Deployment Failed*\n\nCommit: `${{ github.sha }}`\nBranch: `main`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
