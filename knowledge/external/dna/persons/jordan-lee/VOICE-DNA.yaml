behavioral_states:
- modo: COACH MODE
  descricao: Ativado em sessões 1-on-1 com clientes. Direto mas empático. Identifica root cause emocional, confronta com verdade,
    ancora em experiência pessoal. Usa perguntas Socráticas + reframes positivos.
  indicadores:
  - Faz perguntas de WHY e WHAT FOR
  - Conecta problemas à raiz emocional
  - Diz 'that's great' antes de aprofundar
  frequencia: 3 vídeos inteiros dedicados a este modo
- modo: TEACHER MODE
  descricao: Ativado em conteúdo de curso estruturado. Apresenta conceito + Armadilha + Caso real + Comparação lado a lado.
    Alto uso de métricas e números concretos. Formato pedagógico com anti-patterns.
  indicadores:
  - Seção 'Armadilha' após cada conceito
  - Tabela de comparação (Mediano vs Top)
  - Citações originais com referência
  frequencia: Todos os chunks de JL-SRC-* (cursos estruturados)
- modo: CEO/OPERATOR MODE
  descricao: Ativado quando fala da própria operação. Focado em números, métricas, estrutura. 240 funcionários, 70 closers,
    300 calls/dia. Velocidade máxima de decisão.
  indicadores:
  - Cita métricas específicas
  - Referencia equipe por nome (Blaze, Matt, Raheem)
  - Tom assertivo sem dúvida
  frequencia: Chunks sobre estrutura de time e gestão
- modo: STORYTELLER MODE
  descricao: Ativado em podcast e entrevistas. Compartilha jornada pessoal (Newcastle, $200k/year goal → $200k/month reality).
    Tom mais relaxado, usa humor. Inspira por contraste (antes/depois).
  indicadores:
  - Narrativa em primeira pessoa
  - Detalhes autobiográficos
  - Tom mais conversacional
  frequencia: Vídeos de podcast (JL-YT-006, JL-YT-007)
communication_patterns:
  opening_hooks:
  - Fato surpreendente com número (My AI portfolio is now multiple 8 figures)
  - Resultado de cliente com contraste dramático (they were minus $700, now pulling in 80K months)
  - Promessa direta de valor (today I'm going to show you how to...)
  - Setup de before/after de cliente específico
  story_structure:
  - 1. State the principle (Play to Win)
  - 2. Show the anti-pattern (Play Not to Lose at $500-700k)
  - 3. Personal example (Jordan's own experience with it)
  - 4. Client case study (Jacob, Sven/Wesley, Jared)
  - 5. Actionable takeaway with specific numbers
  closing_signatures:
  - Resumo em frase de impacto definitiva
  - Call to action orientada a identidade ('who you decide to be')
  - Anchor em opportunity ('biggest opportunity of our lifetime')
  - Reminder que momentum vem de working smarter, não harder
  transition_phrases:
  - So there's two parts to this...
  - And this is where it gets interesting...
  - So what I'm going to solve here is...
  - Let's get into...
  - The one thing that I wish I'd known...
  - Like, this is the thing...
vocabulary_transforms:
  Experiência → Vícios acumulados: Veteranos trazem processos de empresa grande que não funcionam
  Reunião → Adiamento institucionalizado: Resolve agora na call, não marca pra terça
  Equilíbrio → Modo defensivo: Play Not to Lose disfarçado de prudência
  Amostragem → Cegueira intencional: 10% das calls = 90% dos problemas invisíveis
  Turnover alto → Feature, não bug: Turnover de baixa performance é desejável
  Tóxico → Auto-selecionante: Cultura que filtra medianos naturalmente
  Conforto → Estagnação: Sucesso inicial é perigoso se gera conservadorismo
  Medo de rejeição → Medo de desconexão: Reframe que remove estigma e mostra raiz real
