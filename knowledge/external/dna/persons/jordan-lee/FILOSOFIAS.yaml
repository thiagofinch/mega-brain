entries:
  - id: "INS-JL-001"
    nome: "Sistemas sobre Pessoas"
    descricao: "Sistemas brilhantes executados por pessoas competentes > pessoas brilhantes fazendo coisas brilhantes. Quando a pessoa sai, o sistema continua."
