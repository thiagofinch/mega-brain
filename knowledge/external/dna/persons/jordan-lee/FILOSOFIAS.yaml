  - id: "INS-JL-002"
    nome: "Competencia sobre Experiencia"
    descricao: "Competencia > Experiencia na contratacao. Jovem faminto de 22 que aprende rapido supera veterano de 35 cheio de vicios."
    quote: "If you're 40 and you're not rich yet, you either have been working on the wrong thing or you're just shit"
