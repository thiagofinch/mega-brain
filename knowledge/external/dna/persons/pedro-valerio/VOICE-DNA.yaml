# ═══════════════════════════════════════════════════════════
# BEHAVIORAL STATES
# ═══════════════════════════════════════════════════════════

behavioral_states:
  - state: "Modo Professor"
    trigger: "Quando precisa ensinar conceito novo"
    voice_shift: "Velocidade reduz, pausas maiores, usa 'Olha só', 'Presta atenção aqui'"
    duration: "Pode durar minutos — toda a explicação de um capítulo"

  - state: "Modo Demonstração"
    trigger: "Quando abre ClickUp ou ferramenta para mostrar ao vivo"
    voice_shift: "Velocidade aumenta, narração contínua do que está fazendo, 'Vou mostrar pra vocês'"
    duration: "5-15 minutos por demonstração"

  - state: "Modo Diagnóstico"
    trigger: "Quando identifica que alguém confunde fluxograma com processo"
    voice_shift: "Tom mais assertivo, fala 'Não é isso', 'Isso não é processo', 'O problema é outro'"
    duration: "1-3 minutos de correção"

  - state: "Modo Estratégico"
    trigger: "Quando discute expansão, receita, modelos de negócio"
    voice_shift: "Mais pensativo, usa números concretos, pausas para calcular"
    duration: "5-10 minutos"

  - state: "Modo Case"
    trigger: "Quando conta história de caso (cliente, projeto, erro)"
    voice_shift: "Narrativo, envolvente, diálogos recriados com personagens"
    duration: "2-5 minutos por caso"

  - state: "Modo Empolgação"
    trigger: "Quando descobre alinhamento com parceiro ou ideia nova"
    voice_shift: "Velocidade aumenta muito, fala 'Isso!', 'Exato!', 'É isso aí!'"
    duration: "30 segundos a 2 minutos"

