- id: INS-AH-018
  name: Offer Formula — Value Equation
  description: "Every offer = Dream Outcome \xD7 Likelihood of achieving it \xD7
    Time to achievement \xF7 (Effort + Sacrifice). Manipulate numerator up and denominator
    down."
  quote: "The value equation: Dream Outcome \xD7 Perceived Likelihood of Achievement
    / (Time Delay \xD7 Effort & Sacrifice). Increase the top, decrease the bottom.
    That's all offer creation is."
  source_chunks:
  - AH-chunk-019-03
  source_id: AH-0019
  confidence: 0.97
  priority: HIGH
- id: INS-AH-020
  name: Sales Multipliers Framework — 3 variables determine revenue
  description: "Show Rate (how many prospects attend calls), Offer Strength (does
    it resonate), Close Rate (rep skill). Diagnose which lever to pull before changing
    anything."
  quote: "Three things determine your sales output: show rate, offer strength, and
    close rate. Most people blame close rate when it's actually show rate. Fix the
    right variable."
  source_chunks:
  - AH-chunk-003-01
  - AH-chunk-003-02
