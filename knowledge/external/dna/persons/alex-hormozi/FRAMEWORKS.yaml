- id: INS-AH-001
  name: CLOSER Framework — 6-component sales conversation structure
  description: "The CLOSER Framework (C-L-O-S-E-R) manages every sales conversation:
    Clarify why prospect is there, Label them with a problem, Overview the pain, Sell
    the vacation, Explain concerns away, Reinforce the decision."
  quote: "C is you clarify why the person is there. L — label them with a problem.
    O — overview the pain. S — sell the vacation. E — explain away their concerns.
    R — reinforce the decision."
  source_chunks:
  - AH-chunk-013-01
  - AH-chunk-013-02
  source_id: AH-0013
  confidence: 0.98
  priority: HIGH
- id: INS-AH-010
  name: Ghost Products / Sacrificial Lambs for price anchoring
  description: Create 2-3 expensive irrelevant options alongside your real offer.
    Their presence makes prospects anchor high, making your real offer feel like a
    bargain by comparison.
  quote: "Ghost products or sacrificial lambs are designed to show the value of your
    core service by comparison. They're never meant to be sold — they exist to make
    your real offer look reasonable."
  source_chunks:
  - AH-chunk-006-01
  source_id: AH-0006
  confidence: 0.93
  priority: HIGH
- id: INS-AH-011
  name: Damaging Admission + 'But' Technique
  description: Lead with a genuine weakness or limitation of your product upfront.
    This builds massive credibility, disarms resistance, and everything you say after
    'but' carries disproportionate weight.
  quote: "Damaging admission: you say the worst thing about your product upfront.
    This disarms the prospect. Everything after 'but' carries more weight because
    you've established honesty."
  source_chunks:
  - AH-chunk-009-01
  source_id: AH-0009
  confidence: 0.95
  priority: HIGH
- id: INS-AH-012
  name: AAA Reframing — Acknowledge, Associate, Ask
  description: "Never say 'I understand' in sales — it signals you haven't heard
    them. Instead: (A) Acknowledge their exact words, (A) Associate with a relatable
    reference or story, (A) Ask a redirecting question."
  quote: "AAA: Acknowledge what they said (use their exact words back), Associate
    (not 'I understand' — use a story or reference they can relate to), then Ask
    a question that moves toward resolution."
  source_chunks:
  - AH-chunk-007-01
  source_id: AH-0007
  confidence: 0.93
  priority: HIGH
- id: INS-AH-016
  name: Core Four Lead Generation — the only 4 ways to acquire customers
  description: Warm Outreach, Cold Outreach, Content (organic), and Paid Ads. Master
