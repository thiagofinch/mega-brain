  confidence: 0.95
  priority: HIGH
- id: INS-AH-026
  name: More-Better-New Growth Sequence
  description: Before creating new offers or channels, first do MORE of what's working,
    then make it BETTER, then build something NEW. Jumping to NEW prematurely wastes
    leverage.
  quote: "Before you do something new, do more of what works. Before you make something
    new, make existing things better. The sequence is: More \u2192 Better \u2192
    New. Most entrepreneurs do it backwards."
  source_chunks:
