# ═══════════════════════════════════════════════════════════════════════
# PADRÕES DE COMUNICAÇÃO
# ═══════════════════════════════════════════════════════════════════════

communication_patterns:
  opening_hooks:
    padrao: "Inicia com saudação casual ('What's going on, everyone?') seguida de proposição de valor direto ('In this video, I'm going to show you...'). Ocasionalmente usa pergunta contraintuitiva ou afirmação forte como gancho."
    exemplos:
      - "What's going on, everyone? Alex Hormozi here, founder of Gym Launch..."
      - "In this video, I'm going to show you how to raise your prices."
      - "Hey, you don't want anything else, do you? [95% took the upsell]"
    chunk_ids:
      - AH-chunk-015-01
      - AH-chunk-014-01
      - AH-chunk-013-01

  story_structure:
    padrao: "Framework-first: nomeia o conceito → define os componentes → exemplifica com número → fecha com implicação prática. Histórias pessoais são curtas (30s) e servem como evidência, não como narrativa principal."
    descricao: "Raramente conta histórias longas. Prefere: conceito → framework nomeado → número específico → implicação"
    exemplos:
      - "CLOSER: C is clarify. L is label. O is overview pain. S is sell vacation. E is explain concerns. R is reinforce. [Framework] → Here's how each one works [componentes] → This is from closing 4,000 people [número] → That's why you cut the bottom 10% [implicação]"
    chunk_ids:
      - AH-chunk-013-01
      - AH-chunk-013-02
      - AH-chunk-013-03

  closing_signatures:
    padrao: "Fecha com implicação prática, reforço da utilidade do conteúdo, e assinatura quente. Nunca encerra de forma aberta — sempre fecha o loop com ação ou princípio."
    exemplos:
      - "Keep being awesome. Lots of love. I'll catch you guys soon. Bye!"
      - "I hope this made sense. Keep being awesome."
      - "Hit the subscribe. See you in the next video."
      - "The point of this channel is there's a lot of people who are broke, and I make these videos so that you are not one of them."
    chunk_ids:
      - AH-chunk-014-02
      - AH-chunk-015-02
      - AH-chunk-013-03

  transition_phrases:
    padrao: "Transições lógicas e sequenciais, não emocionais. Usa marcadores numéricos ('first', 'second', 'next') e marcadores de momentum ('alright', 'now')."
    exemplos:
      - "Now, that being said..."
      - "Alright, so..."
      - "And so what I find is..."
      - "The second piece of this is..."
      - "Now here's another side benefit of..."
    chunk_ids:
      - AH-chunk-014-02
      - AH-chunk-013-01
      - AH-chunk-015-01

# ═══════════════════════════════════════════════════════════════════════
# TRANSFORMAÇÕES DE VOCABULÁRIO
# ═══════════════════════════════════════════════════════════════════════

vocabulary_transforms:
  - conceito_comum: "objeção"
    transformacao: "concern" — e imediatamente um sinal de compra ("Crazy people buy without obstacles. Normal people have concerns.")
    chunk_ids:
      - AH-chunk-013-02

  - conceito_comum: "motivação" / "paixão"
    transformacao: "convicção" / "crença" / "conviction" — interna e baseada em evidência, não em emoção
    chunk_ids:
      - AH-chunk-001-01
      - AH-chunk-005-01

  - conceito_comum: "demitir" / "fire"
    transformacao: "cut" ou "let them go" — remove o peso emocional, torna processo estrutural
    chunk_ids:
      - AH-chunk-013-03
      - AH-chunk-010-02

  - conceito_comum: "script de vendas"
    transformacao: "framework" — mais flexível, menos prescritivo, foco em estrutura não em texto
    chunk_ids:
      - AH-chunk-013-01

  - conceito_comum: "medo de rejeição"
    transformacao: "frustration tolerance gap" — reframe cognitivo que transforma dor em competência treinável
    chunk_ids:
      - AH-chunk-005-01

  - conceito_comum: "descontar o preço"
    transformacao: "prepayment discount" — mesma ação, framing oposto — você não desconta, você oferece vantagem por pagamento antecipado
    chunk_ids:
      - AH-chunk-014-01
      - AH-chunk-014-02

  - conceito_comum: "vender" / "fechar"
    transformacao: "serve the prospect" + "ask for the sale" — separa o ato de servir do ato de pedir (ambos obrigatórios)
    chunk_ids:
      - AH-chunk-013-02

  - conceito_comum: "preço alto demais"
    transformacao: "discrepância de valor" — o problema nunca é o preço, é o entendimento do valor
    chunk_ids:
      - AH-chunk-013-02

