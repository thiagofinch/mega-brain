  priority: HIGH
- id: INS-AH-060
  name: Growth businesses must choose who NOT to serve
  description: Trying to serve everyone dilutes the offer and confuses the market.
    The most profitable businesses have the clearest 'not for you' criteria.
  quote: "The clearest brands know exactly who they're NOT for. When you try to serve
    everyone, you serve no one well."
  source_chunks:
