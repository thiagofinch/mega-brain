- id: INS-AH-058
  name: You can never make a sale if you never ask for it
  description: The cardinal rule of sales is asking for the close on every call,
    every time — not hoping the prospect will volunteer to buy.
  quote: "You can never make a sale if you never ask for it."
  source_chunks:
  - AH-chunk-013-03
