  - id: "FIL-CG-002"
    insight_id: "CG-MCE001-002"
    titulo: "Internal Pressure Cria Vendas Que Não Cancelam"
    descricao: "Urgência artificial (fast action discounts, escassez forçada) atrai clientes que compram por pressão externa — exatamente os que vão cancelar. Internal pressure (criada pelo próprio prospect ao verbalizar suas consequências e desejos) cria vendas duradouras com baixo churn e referrals."
    quote: "Internal pressure creates sales that don't cancel. External pressure creates clients who resent you."
    chunk_ids: ["CG-02-04"]
    prioridade: "HIGH"
    confianca: "HIGH"
    categoria: "processo-vendas"

  - id: "FIL-CG-003"
    insight_id: "CG-MCE001-003"
    titulo: "Sales Manager Não Fecha"
    descricao: "O momento em que o manager fecha uma venda, ele passa a competir com o time. Competindo, não desenvolve. Sales Manager = 100% coaching, 0% closing. Essa separação é inegociável — o player-coach é sempre um compromisso, nunca um modelo ideal."
    quote: "The moment you close, you compete with your team. And when you compete, you don't develop."
    chunk_ids: ["CG-09-01"]
    prioridade: "HIGH"
    confianca: "HIGH"
    categoria: "gestao-vendas"
