    titulo: "Objeções São Sintomas, Não Causas"
    descricao: "Se você está tratando objeções no final da call, você já perdeu. Objeções no closing são sintoma de beliefs que não foram instaladas no discovery. A cura está upstream, não downstream. O closer que previne objeções é superior ao que sabe superá-las."
    quote: "Objection prevention is upstream, objection handling is downstream."
