  - id: "MM-CG-002"
    insight_id: "CG-MCE001-005"
    titulo: "Conviction Supera Skill Tático"
    descricao: "Conviction genuína sobre o produto/solução supera habilidade técnica de fechamento. A função do closer é converter a convicção dele em convicção do prospect. Resolve (calma certainty) cria mais confiança que energia pumped up (Tony Robbins style)."
    quote: "Conviction beats tactical skill every time. Your conviction needs to overcome their doubt."
    chunk_ids: ["CG-02-09"]
    prioridade: "HIGH"
    confianca: "HIGH"
    categoria: "inner-game"

  - id: "MM-CG-003"
    insight_id: "CG-MCE001-006"
    titulo: "Métricas São Consequência — Otimize na Ordem Certa"
    descricao: "Maioria dos closers otimiza close rate (errado). A ordem correta é: 1) Show Rate, 2) Offers/day, 3) Close Rate. Um close rate de 30% com show rate 85% produz mais resultado real que close rate 50% com show rate 50%. Otimizar a métrica errada destrói o processo."
    quote: "Show rate is where the game is won or lost. What's the point of closing 40% if only 50% show up?"
    chunk_ids: ["CG-05-01"]
    prioridade: "HIGH"
    confianca: "HIGH"
    categoria: "metricas"
