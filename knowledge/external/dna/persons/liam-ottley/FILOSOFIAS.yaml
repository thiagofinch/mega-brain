philosophies:

  - id: FIL-LO-001
    name: "AIOS is the Third Major Business Shift"
    description: >
      There have been only three major technological shifts that fundamentally
      changed how companies operate: Industrial Revolution (how we make things),
      Internet (how we reach people), and AIOS (how we run everything).
    quote: "This is the future of business. It's the biggest shift since the internet."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: FIL-LO-002
    name: "Layers Not Leaps"
    description: >
      An AI operating system is built incrementally through layers wrapping
      around the business model. Each layer adds capability and compounds
      with previous ones. Never attempt to build everything at once.
    quote: "It's built up in what I call layers and not leaps."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: FIL-LO-003
    name: "Bandwidth is the Founder's Most Valuable Asset"
    description: >
      Most founders are trapped in the "operator trap" spending 80% of time
      IN the business instead of ON it. Freeing bandwidth through automation
      is the primary objective of an AIOS. Bandwidth = ability to grow.
    quote: "The reason most people's businesses aren't growing is because you are too much in this bucket and not enough in this one."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: FIL-LO-004
    name: "Non-Technical Founders Can Build AI Systems"
    description: >
      Claude Code despite the name does not require coding skills. The tools
      are accessible to any founder who follows the right methodology and
      uses plug-and-play modules. Technical skill is not a barrier.
    quote: "Claude Code which despite the name does not actually require you to be a coder."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: FIL-LO-005
    name: "Revenue Per Employee is the New Flex"
    description: >
      The era of flexing headcount is over. The new measure of business
      efficiency is revenue per employee. AI systems will cause a
      "bloodbath" in small business headcount as fewer people are needed.
    quote: "Revenue per employee has become a very sexy metric in the age of AI and this is the new flex."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: FIL-LO-006
    name: "AGI is Here Now"
    description: >
      Artificial General Intelligence is not a future concept. Claude Code
      represents general intelligence for digital-based roles. Anything
      digital is automatable. The question is when you adopt, not if.
    quote: "AGI is here. Claude Code is that. It can be trained to do anything you want it to."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: FIL-LO-007
    name: "Small Business Advantage in AI"
    description: >
      Small businesses have a structural advantage over enterprises in AI
      adoption. They can be nimble, drop old tech stacks, freely connect
      APIs. Enterprise legacy systems (ERPs) make AIOS adoption harder.
    quote: "It is the benefit of the small business who can be nimble, can drop their old tech stack, can move over to new things easily."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: FIL-LO-008
    name: "AI Replaces Departments Not Just Jobs"
    description: >
      AI is not coming for individual jobs but for entire departments.
      Teams that required dozens of people can be replaced by AI workforces
      that run 24/7 without fatigue, quitting, or paychecks.
    quote: "AI isn't just coming for jobs. It's coming for entire departments."
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"

  - id: FIL-LO-009
    name: "Build AI Workforces or Be Replaced By Them"
    description: >
      The opportunity lies not in what disappears but in what's created.
      People who can build AI workforces will thrive. Those who can't
      will be replaced. Position yourself as the builder, not the replaced.
    quote: "The real opportunity lies in what's going to be created."
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"

  - id: FIL-LO-010
    name: "Compound Automation Effect"
    description: >
      Each automated task compounds with the next. The bandwidth freed
      is permanent and cumulative. It's like the most addicting video game
      because you're permanently crossing items off your list.
    quote: "Every task that you wrap in automation is time you're never going to lose again. It actually compounds."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

