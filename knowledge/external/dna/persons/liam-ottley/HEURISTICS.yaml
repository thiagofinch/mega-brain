heuristics:

  - id: HEUR-LO-001
    name: "60-70% Task Automation Target"
    type: numeric
    description: >
      A founder should aim to automate 60-70% of their recurring tasks
      within 30 days of AIOS setup. This is the threshold where bandwidth
      shift becomes significant enough to enable new initiatives.
    threshold: "60-70% of tasks automated"
    quote: "I'm going for 60 to 70% of mine over the next 30 days."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: HEUR-LO-002
    name: "80/20 Bandwidth Split (Reverse It)"
    type: numeric
    description: >
      Default state: 80% time IN the business, 20% ON the business.
      Goal state: 20% ITB, 80% OTB. The AIOS methodology exists
      to systematically move this bar from 80/20 to 20/80.
    threshold: "From 80/20 to 20/80 ITB/OTB ratio"
    quote: "For most of us we are spending like 80% on must-dos and then we have this little bit here, our 20%."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: HEUR-LO-003
    name: "7-Day Sprint vs Quarter"
    type: numeric
    description: >
      With AIOS bandwidth freed, a major initiative (webinar, product launch)
      can be executed in 7 days vs the traditional 1-2 quarters. This is
      possible when founder has both freed bandwidth AND the AI workspace.
    threshold: "7 days with AIOS = 1 quarter traditional"
    quote: "I got more work done in a week than an entire team would be able to do over a quarter normally."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: HEUR-LO-004
    name: "Daily Brief Before 8am"
    type: qualitative
    description: >
      Every morning before 8am, receive a synthesized 5-10 page PDF
      briefing covering all businesses. Includes revenue, meetings,
      Slack activity, SWOT analysis, content performance. Makes you
      the most informed person in the organization without any meetings.
    threshold: "Daily brief delivered before 8am via Telegram"
    quote: "I'm the most informed person in my entire organization before 8:00 AM and I didn't have to sit through a single meeting."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: HEUR-LO-005
    name: "Revenue Per Employee Must Go Up"
    type: numeric
    description: >
      With AIOS, revenue per employee should increase. Either revenue
      goes up with same headcount, headcount goes down with same revenue,
      or both. This is the efficiency metric to track.
    threshold: "Revenue/employee trending UP"
    quote: "Revenue per employee should be going up for you as an entrepreneur."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: HEUR-LO-006
    name: "15% AI Decisions by 2028"
    type: numeric
    description: >
      Gartner predicts 15% of all work decisions will be made by
      AI agents by 2028, up from near zero today. This validates
      the urgency of building AI workforce capabilities now.
    threshold: "15% by 2028 (Gartner)"
    quote: "Gartner predicts that 15% of all work decisions will be made by AI agents by 2028."
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"

  - id: HEUR-LO-007
    name: "Test Away-From-Desk Regularly"
    type: qualitative
    description: >
      Periodically test running your business entirely from your phone
      (Telegram). If something breaks or is missing, that's what to
      fix next. Goal: 100% capability away from desk.
    threshold: "100% business operations from phone"
    quote: "You need to test that occasionally. Go away for the weekend without your laptop."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: HEUR-LO-008
    name: "7-8 Dashboards Consolidated to One"
    type: numeric
    description: >
      The average founder checks 7-8 platforms daily (CRM, analytics,
      revenue, marketing). AIOS data layer consolidates all into one
      place, checkable like a weather app.
    threshold: "7-8 dashboards → 1 unified view"
    quote: "It used to be seven or eight different platforms just to understand what was going on in the morning."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

