frameworks:

  - id: FW-LO-001
    name: "5-Layer AIOS Framework"
    description: >
      The core framework for building an AI Operating System. Five layers
      that stack and compound, each powerful alone but transformative together.
    layers:
      - layer: 1
        name: "Context"
        purpose: "AI learns your business — team, strategy, products, history"
        outcome: "No more re-explaining. AI knows like a co-founder."
      - layer: 2
        name: "Data"
        purpose: "All dashboards consolidated — CRM, analytics, revenue, marketing"
        outcome: "Check business health like checking the weather app."
      - layer: 3
        name: "Intelligence"
        purpose: "Meeting synthesis, Slack analysis, daily briefs, SWOT analysis"
        outcome: "Most informed person in the org before 8am without meetings."
      - layer: 4
        name: "Automate"
        purpose: "Task audit → categorize → automate recurring tasks"
        outcome: "60-70% of tasks automated, bandwidth permanently freed."
      - layer: 5
        name: "Build"
        purpose: "Use freed bandwidth + AI workspace for new initiatives"
        outcome: "7-day sprints replacing quarterly timelines."
    quote: "When you stack them together, they compound into something that completely changes how you operate as a founder."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"
    reinforced_chunks: ["chunk_638"]
    reinforced_by: "INS-LO-026"

  - id: FW-LO-002
    name: "3 KPIs of AIOS"
    description: >
      Three key performance indicators to measure AIOS effectiveness.
      Without clear KPIs, founders wander without direction.
    kpis:
      - kpi: 1
        name: "Away-From-Desk Autonomy"
        measure: "% of work doable from phone (Telegram)"
        target: "100%"
      - kpi: 2
        name: "Task Automation Percentage"
        measure: "% of recurring tasks automated or heavily augmented"
        target: "60-70%"
      - kpi: 3
        name: "Revenue Per Employee"
        measure: "Total revenue / headcount"
        target: "Increasing trend"
    quote: "Without a clear goal, we're just going to be wandering around."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"
    reinforced_chunks: ["chunk_648"]
    reinforced_by: "INS-LO-035"

  - id: FW-LO-003
    name: "Task Audit Framework"
    description: >
      Systematic approach to identifying automation opportunities.
      List every recurring task, categorize AI capability, prioritize
      by bandwidth impact.
    steps:
      - step: 1
        action: "List every recurring task across all businesses/responsibilities"
      - step: 2
        action: "Ask AIOS to categorize each: YES (fully automatable), PARTIAL (augmentable), NO (human required)"
      - step: 3
        action: "Prioritize by bandwidth freed (highest impact first)"
      - step: 4
        action: "Use /explore to build automation for each task"
      - step: 5
        action: "Set up cron jobs for automated tasks"
      - step: 6
        action: "Track automation percentage against target"
    quote: "Sit down and list out every single one of the tasks that you do across your business."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: FW-LO-004
    name: "Daily Brief Framework"
    description: >
      System for automated morning intelligence briefing. Combines
      all data sources into synthesized report delivered via Telegram.
    components:
      - name: "Meeting Synthesis"
        source: "Fireflies (meeting recorder) → local database"
      - name: "Communication Analysis"
        source: "Slack messages → stored and queryable"
      - name: "Data Dashboard"
        source: "Stripe, Bitly, Google Analytics, CRM → unified view"
      - name: "SWOT Analysis"
        source: "AI-generated based on all inputs"
      - name: "Content Ideas"
        source: "Pattern detection from community + comments"
    outputs:
      - "Short Telegram summary (daily)"
      - "5-10 page PDF deep-dive (daily)"
      - "Anomaly alerts (real-time)"
    quote: "Every morning before I even get out of bed, I have a full briefing waiting for me on my phone."
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"

  - id: FW-LO-005
    name: "AI Workforce Structure"
    description: >
      Framework for building AI teams organized by department.
      Each department gets specialized AI agents that collaborate
      to handle workflows end-to-end.
    departments:
      - name: "Marketing"
        agents: "Content creation, ad management, analytics"
      - name: "Sales"
        agents: "Lead qualification, follow-up, proposal generation"
      - name: "Operations"
        agents: "Process automation, reporting, scheduling"
      - name: "Creative"
        agents: "Design, thumbnails, video concepts"
      - name: "Customer Support"
        agents: "Ticket handling, FAQ, escalation"
    tools: "n8n, Make, Relevance AI, Claude Code"
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"

  - id: FW-LO-006
    name: "Skills System"
    description: >
      Reusable workflow documentation that teaches Claude Code how to
      perform specific tasks. Skills can be created by the founder or
      borrowed from others. They're the building blocks of AIOS automation.
    mechanism: >
      Skills are docs/folders that document a workflow. When triggered,
      Claude reads the skill and follows the instructions. Skills are
      shareable and installable as plug-and-play modules.
    example: "Thumbnail creation skill — teaches Claude to create thumbnails with AI image generators"
    quote: "Skills are like little docs or folders that you can get Claude to create which document a workflow."
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  # ---- INS-LO-039 (Pipeline Run 2, chunks 636-655) ----

  - id: FW-LO-007
    name: "Arquitetura de Agentes: Context + Tools + Workflows + Guardrails"
    description: >
      Framework para construir agentes de IA robustos com 4 componentes
      obrigatórios: (1) Context — o agente precisa saber quem é, para quem
      trabalha e qual o objetivo; (2) Tools — conexões com APIs, bancos de
      dados e sistemas externos; (3) Workflows — sequência de passos que o
      agente segue para completar uma tarefa; (4) Guardrails — limites e
      validações que impedem o agente de sair do escopo ou gerar erros.
      Sem qualquer um dos 4, o agente falha em produção.
    components:
      - name: "Context"
        purpose: "Identidade, objetivo e conhecimento de domínio do agente"
      - name: "Tools"
        purpose: "APIs, databases, integrações externas que o agente pode usar"
      - name: "Workflows"
        purpose: "Sequência de passos estruturados para completar tarefas"
      - name: "Guardrails"
        purpose: "Validações, limites de escopo e fallbacks de segurança"
    insight_ref: "INS-LO-039"
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"
    reinforced_chunks: ["chunk_651"]

