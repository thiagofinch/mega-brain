methodologies:

  - id: MET-LO-001
    name: "AIOS Implementation Methodology"
    description: >
      Complete step-by-step methodology for building an AI Operating System
      from scratch as a non-technical founder. Sequential layers that build
      on each other.
    steps:
      - step: 1
        name: "Context Layer Setup"
        actions:
          - "Document who you are, what you sell, values, team structure"
          - "Load business strategy (quarterly and annual)"
          - "Set up Claude Code workspace with CLAUDE.md containing all context"
          - "Verify: AI can answer questions about your business without prompting"
      - step: 2
        name: "Data Layer Setup"
        actions:
          - "Identify all data sources (CRM, Stripe, Analytics, Bitly, etc.)"
          - "Connect data sources to Claude Code workspace"
          - "Build unified dashboard (one-glance view)"
          - "Verify: can query any metric conversationally"
      - step: 3
        name: "Intelligence Layer Setup"
        actions:
          - "Connect meeting recorder (Fireflies) to local database"
          - "Connect Slack to queryable storage"
          - "Build Daily Brief automation (Telegram + PDF)"
          - "Set up cron job for daily synthesis before 8am"
          - "Include daily SWOT analysis and synthesis as part of the brief"
          - "Verify: receiving comprehensive daily brief"
        reinforced_chunks: ["chunk_639"]
        reinforced_by: "INS-LO-027"
      - step: 4
        name: "Automate Layer"
        actions:
          - "Execute Task Audit (list ALL recurring tasks)"
          - "Categorize: YES / PARTIAL / NO for AI capability"
          - "Prioritize by bandwidth impact"
          - "Use /explore command to build each automation"
          - "Set up cron jobs for recurring automations"
          - "Track: automation percentage target 60-70%"
          - "Ensure every automated task compounds with the next — bandwidth freed is permanent"
        reinforced_chunks: ["chunk_640"]
        reinforced_by: "INS-LO-028"
      - step: 5
        name: "Build Layer"
        actions:
          - "Use freed bandwidth for new initiatives"
          - "Execute 7-day sprints for major projects"
          - "Leverage full AIOS workspace for accelerated execution"
          - "Decide: build more or enjoy freedom"
    timeline: "Days to weeks per layer, not months"
    source: "The Biggest Shift in Business Since the Internet Just Happened + What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"
    reinforced_chunks: ["chunk_647", "chunk_649"]
    reinforced_by: "INS-LO-034 (Task Audit: 83 tasks, 54 targeted for automation), INS-LO-036 (Daily Brief spec: 5-10pg PDF, 80 API calls across 6 data streams)"

  - id: MET-LO-002
    name: "7-Day Sprint Methodology"
    description: >
      Compressed execution framework for major business initiatives.
      Uses freed AIOS bandwidth plus AI workspace to accomplish in
      7 days what traditionally takes a quarter.
    steps:
      - day: "1-2"
        action: "Research & Analysis"
        detail: "Analyze comments, community messages, surface themes. Plan offer and structure."
      - day: "3-4"
        action: "Content Production"
        detail: "Plan, package, and film 5 YouTube videos. Use content pipeline for concepts, titles, thumbnails."
      - day: "5"
        action: "Infrastructure Build"
        detail: "Webinar structure + slides. Email sequences. Funnels. Payment systems. Landing pages. Follow-up automations."
      - day: "6"
        action: "Deliver"
        detail: "Execute the webinar / launch event."
      - day: "7"
        action: "Collect & Optimize"
        detail: "Process deposits, bookings, follow-ups. Analyze results."
    result: "$1M NZD in 7 days (Liam's case study)"
    source: "The Biggest Shift in Business Since the Internet Just Happened"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/The Biggest Shift in Business Since the Internet Just Happened [youtube.com_watch_v=oC1h922cDoY].txt"
    reinforced_chunks: ["chunk_642"]
    reinforced_by: "INS-LO-030"

  - id: MET-LO-003
    name: "Explore Command Method"
    description: >
      Non-technical approach to building automations using Claude Code's
      intelligence. Simply describe the task and let Claude figure out
      the implementation.
    steps:
      - step: 1
        action: "Identify a task from your Task Audit"
      - step: 2
        action: "Tell Claude: 'I am doing [task]. /explore. I want to automate this. Can you help me figure it out?'"
      - step: 3
        action: "Claude searches web, codebase, and business context to propose solution"
      - step: 4
        action: "Walk through implementation step-by-step with Claude"
      - step: 5
        action: "Set up on schedule (cron job) if recurring"
      - step: 6
        action: "Cross task off the audit list permanently"
    prerequisite: "Must have Context and Data layers set up first"
    source: "What Is an AI Operating System"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/What Is an AI Operating System (And Why Every Business Will Need One) [youtube.com_watch_v=DXcVT07bQ6g].txt"

  - id: MET-LO-004
    name: "AI Workforce Sales Methodology"
    description: >
      How to position and sell AI workforce building as a service
      to businesses. Includes discovery, proposal, and implementation.
    steps:
      - step: 1
        action: "Identify target companies with manual-heavy departments"
      - step: 2
        action: "Map their current workflows and pain points"
      - step: 3
        action: "Scope AI agent workforce to replace/augment specific departments"
      - step: 4
        action: "Use Claude Code to generate proposals and slide decks from call transcripts"
      - step: 5
        action: "Build AI workforce using n8n/Make/Relevance AI"
      - step: 6
        action: "Deploy, monitor, and iterate"
    business_model: "Agency model — build AI workforces for clients"
    company: "Morningside AI (Liam's agency)"
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"

  # ---- INS-LO-038 + INS-LO-041 (Pipeline Run 2, chunks 636-655) ----

  - id: MET-LO-005
    name: "Metodologia de Vendas para Agência de IA (4 Etapas)"
    description: >
      Processo estruturado de vendas para agências de IA, do primeiro
      contato ao onboarding. Quatro etapas sequenciais com regra crítica
      na etapa de discovery: 80% escuta, 20% fala.
    steps:
      - step: 1
        name: "Lead Generation"
        actions:
          - "Identificar empresas com departamentos manual-heavy"
          - "Usar LinkedIn, comunidades e referrals como canais primários"
          - "Criar conteúdo demonstrando capacidade (case studies > posts teóricos)"
      - step: 2
        name: "Discovery Call"
        actions:
          - "REGRA: 80% do tempo OUVINDO, 20% falando"
          - "Mapear workflows atuais e pain points"
          - "Identificar tarefas repetitivas e departamentos com overhead humano"
          - "Nunca propor solução na call de discovery — apenas coletar informação"
        heuristic_ref: "HEUR-LO-011"
      - step: 3
        name: "Proposal"
        actions:
          - "Gerar proposta usando Claude Code a partir do transcript da discovery"
          - "Precificar agentes a 40-60% do custo humano equivalente"
          - "Stackear 3-5 agentes por cliente ($1.5-3K cada)"
          - "Mostrar ROI claro: custo AI vs custo headcount atual"
        heuristic_ref: "HEUR-LO-009, HEUR-LO-010"
      - step: 4
        name: "Onboarding & Deploy"
        actions:
          - "Construir AI workforce usando n8n/Make/Relevance AI"
          - "Deploy incremental (1 agente por vez, validar antes de escalar)"
          - "Monitorar performance e iterar"
          - "Coletar case study com números reais para próxima venda"
        heuristic_ref: "HEUR-LO-013"
    insight_ref: "INS-LO-038, INS-LO-041"
    source: "How to Build and Sell AI Agent Workforces"
    raiz: "knowledge/external/inbox/liam-ottley/podcasts/How to Build and Sell AI Agent Workforces as a Beginner FULL COURSE [youtube.com_watch_v=pTTvyQDK_tk].txt"
