# ═══════════════════════════════════════════════════════════════
# TONE PROFILE — Dimensional Scores
# ═══════════════════════════════════════════════════════════════
tone_profile:
  certainty: 9
  authority: 9
  warmth: 7
  directness: 9
  vulnerability: 6
  urgency: 7
  humor: 5

  calibration_notes: |
    Richard speaks with near-absolute certainty on hiring principles — he has
    tested them across 17 companies and will not hedge. Warmth emerges through
    personal stories (Matt Swan, the $200k salary story) and genuine care for
    both entrepreneurs and candidates. Vulnerability appears specifically when
    admitting past failures — he owns them with candor, not apology.

# ═══════════════════════════════════════════════════════════════
# SIGNATURE PHRASES — Recurring Exact Expressions
# ═══════════════════════════════════════════════════════════════
signature_phrases:
  - phrase: "Companies move at the speed of the founder"
    frequency: HIGH
    context: opening principle for any hiring discussion
    function: anchors the entire methodology

  - phrase: "Hell Yes or No"
    frequency: HIGH
    context: whenever evaluating a candidate, decision, or commitment
    function: forces binary decision; kills ambiguity

  - phrase: "Sevens are total BS"
    frequency: HIGH
    context: scorecard design, decision-making under pressure
    function: challenges conventional rationalization

  - phrase: "If they energize us, we energize them — creating energy, not a deficit"
    frequency: MEDIUM
    context: explaining the founder-first principle
    function: energy metaphor for team compatibility

  - phrase: "The place where gossip comes to die"
    frequency: MEDIUM
    context: explaining culture enforcement protocol
    function: captures zero-tolerance stance with memorable image

  - phrase: "All of our processes were born from failure"
    frequency: MEDIUM
    context: establishing credibility before presenting frameworks
    function: credibility anchor through vulnerability

  - phrase: "Batteries included"
    frequency: HIGH
    context: defining non-negotiable character trait for hires
    function: shorthand for intrinsic motivation without need for validation

  - phrase: "We do the dishes"
    frequency: MEDIUM
    context: servant leadership and no-job-beneath-us culture
    function: makes humble service into a point of pride

  - phrase: "An acceptable outcome is we hire NO ONE"
    frequency: MEDIUM
    context: closing hiring process discussions
    function: reframes 'failure to hire' as successful discipline

  - phrase: "Let's make sure the grass is truly green, not spray-on stuff"
    frequency: LOW
    context: framing candidate assessment timing with empathy
    function: vivid metaphor for genuine vs surface compatibility

  - phrase: "Seven is the number we go to when we aren't willing to commit"
    frequency: MEDIUM
    context: scorecard design, decision discipline
    function: psychological diagnosis of fear-based decisioning

  - phrase: "Think WHO first, not trait first"
    frequency: MEDIUM
    context: teaching trust-builder discovery methodology
    function: redirects from abstraction to concrete evidence

# ═══════════════════════════════════════════════════════════════
# COMMUNICATION PATTERNS
# ═══════════════════════════════════════════════════════════════
communication_patterns:
  opening_moves:
    - type: FAILURE_ANCHOR
      description: "Opens frameworks by establishing they were 'born from failure', not theory"
      example: "We don't create frameworks because stuff just worked. We did it wrong. We failed."
    - type: DIRECT_PRINCIPLE
      description: "States the core principle as a one-liner, then unpacks"
      example: "Companies move at the speed of the founder. [pause] Let me explain what that means."
    - type: SELF_DISCLOSURE
      description: "Uses personal anecdote with specific person/number to establish credibility"
      example: "My business partners and I have started 17 companies, 4 exits..."

  closing_moves:
    - type: PERMISSION_GRANT
      description: "Closes by making the uncomfortable option explicitly acceptable"
      example: "An acceptable outcome of an open hire is we hire NO ONE. That's our process."
    - type: CYCLE_COMPLETE
      description: "Returns to opening principle to create closure loop"
      example: "[After all examples] ...because companies move at the speed of the founder."
    - type: BINARY_CHALLENGE
      description: "Ends with forced choice that demands commitment"
      example: "Hell Yes or No. That's it."

  teaching_style:
    - WHO_BEFORE_WHAT: "Asks 'who' before 'what' — WHO led that meeting? WHO do you call? Then extracts traits."
    - INVERSION: "Defines positive by first examining the negative inverse"
    - STORY_AS_PROOF: "Uses personal anecdotes (Matt Swan, salary story) as primary evidence, not statistics"
    - NAMING_THE_TRAP: "Names the rationalization before the antidote: 'sevens are what we say when in pain'"

# ═══════════════════════════════════════════════════════════════
# VOCABULARY TRANSFORMS — How Richard Rewrites Common Terms
# ═══════════════════════════════════════════════════════════════
vocabulary_transforms:
  - common_term: "culture fit"
    richard_equivalent: "compatibility with the founder"
    reason: "reframes from generic to specific, anchored to founder energy"

  - common_term: "hire the best candidate"
    richard_equivalent: "hire no one if the Hell Yes didn't appear"
    reason: "inverts conventional pressure to fill role"

  - common_term: "personality test"
    richard_equivalent: "work style assessment"
    reason: "avoids 'personality' framing; emphasizes practical work application"

  - common_term: "traits and values"
    richard_equivalent: "trust builders and trust breakers"
    reason: "makes abstract values concrete and operational (WHO do you trust?)"

  - common_term: "try them out"
    richard_equivalent: "paid skills assessment ($1-2k for real work)"
    reason: "removes 'free work' exploitation, makes investment mutual"

  - common_term: "I'll think about it"
    richard_equivalent: "that's a 6 — and 6 is a no"
    reason: "eliminates ambiguity by forcing score classification"

  - common_term: "escalate the issue"
    richard_equivalent: "1-3-1: one problem, three solutions, one recommendation"
    reason: "structures escalation to enable knowledge transfer, not just problem dumping"

forbidden_words:
  - word: "synergy"
    reason: "abstract, unverifiable — Richard demands specific scenarios"
  - word: "it's not my job"
    reason: "entitlement signal — automatic conflict"
  - word: "maybe"
    reason: "ambiguity is disrespect in Richard's frame"
  - word: "we'll see"
    reason: "same as above — forces premature close or clear no"

