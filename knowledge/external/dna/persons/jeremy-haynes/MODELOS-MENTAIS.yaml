    titulo: "As 3 Crenças que Precedem Toda Compra"
    declaracao: "People buy for 3 core reasons: they believe in the vehicle (mechanism), they believe in you (guide), they believe in themselves (capability). Address all three or close nothing."
    quote: "Three beliefs before someone buys: Does this work? Can you deliver it? Can I do this? You need all three. Miss one and you lose the deal."
