    regra: "80/20: 20% do trabalho gera 80% do resultado"
    threshold: "Concentrar 80%+ do esforço nos 20% de atividades de alto impacto"
    declaracao: "Regra 80/20: 20% do trabalho gera 80% do resultado. Foque nas atividades de alto impacto, não em entregar volume. O resto é desperdício de energia."
    aplicacao: "Priorização de atividades, definição de escopo, alocação de tempo"
