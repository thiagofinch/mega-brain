    insight_ref: "SO-INS-012"
    regra: "Break-even do cliente em 1-3 meses = modelo saudável"
    threshold: "Acima de 3 meses → problema em pricing ou CAC"
    declaracao: "Break-even: 1-3 meses para novo cliente. Se demora mais, ajuste pricing ou CAC."
    aplicacao: "Diagnóstico de viabilidade do modelo de receita"
    chunk_ids: ["SO-chunk-006"]
    tags: ["break-even", "CAC", "1-3-meses"]
    confianca: "HIGH"

