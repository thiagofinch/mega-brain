  - id: "HEU-SO-002"
    insight_ref: "SO-INS-007"
    regra: "DWY é o gold standard — equilíbrio liberdade do founder vs responsabilidade pelo resultado"
    threshold: "Para agências e consultores: DWY antes de DFY ou DIY"
    declaracao: "DWY (Done With You) = GOLD STANDARD. Você GUIA, cliente EXECUTA. Equilíbrio preço × escala. Cliente tem skin in the game."
    aplicacao: "Seleção do modelo de entrega para agências/consultores"
    chunk_ids: ["SO-chunk-004", "SO-chunk-013"]
    tags: ["DWY", "modelo-de-entrega", "gold-standard"]
    confianca: "HIGH"

  - id: "HEU-SO-003"
    insight_ref: "SO-INS-010"
    regra: "Cobrar 10% do valor lifetime gerado = deal óbvio para o cliente"
    threshold: "Pricing = ~10% do valor do resultado gerado ao longo da vida do cliente"
    declaracao: "Se resultado vale $500k ao longo da vida, cobrar $50k é 10% do valor = deal óbvio."
    aplicacao: "Definição de preço baseado em ROI lifetime"
    chunk_ids: ["SO-chunk-005"]
    tags: ["pricing", "university-model", "ROI-lifetime", "10-percent"]
    confianca: "HIGH"

  - id: "HEU-SO-004"
    insight_ref: "SO-INS-011"
    regra: "Net profit mínimo 30-40% da receita"
    threshold: "Abaixo de 30% = problema de pricing ou custo de entrega"
    declaracao: "60-70% on fulfillment, 20-30% on marketing/sales, 30-40% net profit. 30% net profit é o mínimo. Menos que isso, você não tem buffer pra erros, sazonalidade, ou investimento."
    aplicacao: "Validação da saúde financeira do modelo de negócio"
    chunk_ids: ["SO-chunk-006", "SO-chunk-007"]
    tags: ["net-profit", "margem", "saude-financeira", "30-percent"]
    confianca: "HIGH"

