version: "1.0.0"
description: >
  Registry contract for all 24 Chronicler templates.
  Every emitter that writes to PHASE-STREAM.jsonl MUST have a corresponding entry here.
  Missing entry = hook chronicler_registry_guard.py blocks the commit (AC-8).
story: STORY-MCE-6.0
phase: 4

templates:
  - id: ingestion_guard
    emitter_fn: engine.intelligence.pipeline.mce.log_emitters.emit_ingestion_guard
    renderer_fn: .claude.skills.chronicler.renderers.render_ingestion_guard
    schema: engine/schemas/ingestion-guard.schema.json
    phase_idx: 0
    required: true
    description: Ingestion dedup verdict (NEW / SKIP / INCREMENTAL)

  - id: ingest_report
    emitter_fn: engine.intelligence.pipeline.mce.log_emitters.emit_ingest_report
