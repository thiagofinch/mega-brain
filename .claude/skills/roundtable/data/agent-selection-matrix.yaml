# Agent Selection Matrix — Mega Brain Roundtable
# Adapted from mega-brain v2.1.0 + mega-brain specific domains
# Version: 1.0.0
#
# Schema: domain_to_agents
#   <domain_id>:                   # string — unique domain identifier (kebab-case)
#     keywords: string[]           # REQUIRED — trigger words matched against topic/files (case-insensitive)
#     agents: string[]             # REQUIRED — agent refs (@agent-name) assigned when domain matches
#     auto_include: boolean        # OPTIONAL (default: false) — if true, agent is auto-added to every roundtable
#   Match logic: if ANY keyword appears in topic/file context, domain agents are included.
#   Multiple domains can match simultaneously (union of agents).

domain_to_agents:

  # ═══════════════════════════════════════════════════════════
  # CORE DOMAINS (from mega-brain)
  # ═══════════════════════════════════════════════════════════

