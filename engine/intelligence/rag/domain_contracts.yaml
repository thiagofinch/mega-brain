# Domain-File Contract Registry
# ================================
# Maps business domains to deterministic file paths.
# When a query matches a domain contract, these files are read DIRECTLY
# (no RAG, no vector search). If no contract matches, fall through to hybrid.
#
# ADDING A NEW CONTRACT:
#   1. Pick a unique domain key (kebab-case)
#   2. Add keywords (PT + EN) that indicate this domain
#   3. List files under always_read (relative to project root)
#   4. Set fallback (usually hybrid_search)
#
# Paths use forward slashes, relative to project root.
# The contract_resolver resolves them against core.paths.ROOT at runtime.
#
# Version: 1.0.0
# Date: 2026-03-25

version: "1.0"

contracts:
