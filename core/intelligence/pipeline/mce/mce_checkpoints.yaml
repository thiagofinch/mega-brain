# ============================================================================
# BLOCKING RULES
# These are explicit blocking conditions stated in the prompt templates
# that define when the pipeline MUST stop
# ============================================================================

blocking_rules:
  - rule_id: "BR-001"
    source: "prompt-1.1-chunking.md"
    step_number: 3
    condition: "Any post-execution checkpoint fails"
    action: "Do NOT proceed to Step 4 (Entity Resolution)"
    blocking_checkpoints:
      - "CP-POST-2.A"
      - "CP-POST-2.B"
      - "CP-POST-2.C"

  - rule_id: "BR-002"
    source: "prompt-1.2-entity-resolution.md"
    step_number: 4
    condition: "CANONICAL-MAP.json save fails (CP-POST-3.C)"
    action: "Do NOT proceed to Step 5 (Insight Extraction)"
    blocking_checkpoints:
      - "CP-POST-3.C"

  - rule_id: "BR-003"
    source: "prompt-2.1-insight-extraction.md"
    step_number: 5
    condition: "Any post-execution checkpoint fails"
    action: "Do NOT proceed to Step 6 (MCE Behavioral)"
    blocking_checkpoints:
      - "CP-POST-4.A"
      - "CP-POST-4.B"
      - "CP-POST-4.C"
      - "CP-POST-4.D"

  - rule_id: "BR-004"
    source: "prompt-mce-behavioral.md"
    step_number: 6
    condition: "Checkpoints A, B, D, or F fail"
    action: "Do NOT proceed to Step 7 (MCE Identity)"
    blocking_checkpoints:
      - "CP-POST-MCE1.A"
      - "CP-POST-MCE1.B"
      - "CP-POST-MCE1.D"
      - "CP-POST-MCE1.F"

  - rule_id: "BR-005"
