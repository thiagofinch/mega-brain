    step_number: 7
    condition: "Checkpoints A, B, E, F, G, K, or M fail"
    action: "Do NOT proceed to Step 8 (MCE Voice)"
    blocking_checkpoints:
      - "CP-POST-MCE2.A"
      - "CP-POST-MCE2.B"
      - "CP-POST-MCE2.E"
      - "CP-POST-MCE2.F"
      - "CP-POST-MCE2.G"
