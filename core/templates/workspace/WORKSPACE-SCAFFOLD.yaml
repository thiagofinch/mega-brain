# WORKSPACE-SCAFFOLD.yaml — Default shell for new Mega Brain installations
# Used by: bin/lib/installer.js → scaffoldWorkspace()
# Version: 1.0.0 (S13 restructure)
#
# This file defines the complete workspace directory tree.
# Every new project gets this structure on `npx mega-brain-ai setup`.

version: "1.0.0"
description: "Workspace scaffold — 7 departmental spaces + businesses DNA + system"

# ── Root files (created with placeholders) ────────────────────────
root_files:
  - workspace.yaml
  - structure.yaml
  - relationships.yaml
  - MASTER-INDEX.md

# ── System & Templates ────────────────────────────────────────────
system:
  - _system/config
  - _system/_ref
  - _templates
  - inbox/calls
  - inbox/documents
  - inbox/financial
  - inbox/meetings
  - inbox/slack

# ── Business Unit Template (12 folders per BU) ───────────────────
# Each business created via CLI gets these 12 subdirectories.
bu_template:
  - _preserved
  - ai
  - analytics
  - brand
  - company
  - copy
  - design-system
  - evidence
  - movement
  - operations
  - products
  - tech

