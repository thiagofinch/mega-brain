    insights_adicionais:
      - id: "CG-PTMA001"
        tema: "Método PTMA"
        descricao: "Planejar → Treinar → Motivar → Acompanhar/Cobrar - DIÁRIO, não semanal"
        aplicacao: "Framework central de gestão de times de vendas"
      - id: "CG-DISC001"
        tema: "4 Tipos DISC"
        descricao: "D-Dominante, I-Influente, S-Estável, C-Sistemático - cada um com gestão ADAPTADA"
        aplicacao: "Diagnosticar perfil e adaptar estilo de coaching"
      - id: "CG-ONB001"
        tema: "Cronograma 8 Semanas"
        descricao: "S1-Onboard, S2-Técnico, S3-Comportamental (87%), S4-Campo, S5-Lab, S6-8-Ajustes"
        aplicacao: "Onboarding estruturado de vendedores novos"
      - id: "CG-HIRE001"
        tema: "Processo 6 Passos Contratação"
        descricao: "Definir → Atrair → Avaliar → Testar → Decidir → Integrar"
        aplicacao: "Hiring sistemático de vendedores"
      - id: "CG-87COMP"
        tema: "87% Comportamental, 13% Técnico"
        descricao: "Treinamento de vendedores deve ser majoritariamente comportamental"
        aplicacao: "Priorização de desenvolvimento de time"

  - pessoa: "alex-hormozi"
    peso: 0.90  # AUMENTADO em Phase 5.3 - Principal fonte de scaling
    dominios_absorvidos:
      - "Farm System (Hiring)"
      - "Sales System (3 Playbooks)"
      - "Scaling Framework"
      - "Money Model Thinking"
      - "Unit Economics"           # NOVO Phase 5.3
      - "Volume is Vanity"         # NOVO Phase 5.3
      - "CAC/LTV Discipline"       # NOVO Phase 5.3
      - "9 Ways to Grow"           # NOVO Phase 5.3
    path: "/knowledge/dna/persons/alex-hormozi"
    justificativa: "Framework de escala, contratacao e unit economics como bussola"
    # ENRIQUECIDO Phase 5.3 com SOURCE-AH.md content
    insights_adicionais:
      - id: "AH-UNIT001"
        tema: "Unit Economics como Bussola"
        descricao: "Todo scaling decision passa por unit economics primeiro"
        aplicacao: "NAO escalar sem CAC < 1/3 LTV. Escalar prejuizo = prejuizo maior."
      - id: "AH-VOL001"
        tema: "Volume is Vanity, Cash Collected is Sanity"
        descricao: "Leads, calls, propostas nao importam. So cash importa."
        aplicacao: "Metricas de vaidade vs metricas de resultado"
      - id: "AH-ESC001"
        tema: "Escala Testa Sistema, Nao Pessoas"
        descricao: "Se escala quebra, o sistema era fragil. Pessoas nao mudam, sistemas sim."
        aplicacao: "Diagnostico de falha de escala"
      - id: "AH-9WAYS001"
        tema: "9 Ways to Grow a Business"
        descricao: "More customers, Higher ARPU, Lower churn. Cada um multiplicado por 3 alavancas."
        aplicacao: "Framework de priorizacao de iniciativas"
      - id: "AH-LTV001"
        tema: "LTV:CAC Discipline"
        descricao: "3:1 minimo para escalar. 5:1 para escalar agressivamente."
        aplicacao: "Gate de aprovacao para aumento de budget"

    peso: 0.75
    dominios_absorvidos:
      - "Maquina de Vendas"
      - "Metodologias BR (SPIN, MEDDIC, Sandler)"
      - "Calibracao Cultural Brasil"
    justificativa: "Adaptacao para mercado brasileiro"

    peso: 0.70
    dominios_absorvidos:
      - "Estrutura Time BR"
      - "Dimensionamento e Sizing"
      - "Benchmarks BR (metricas, remuneracao)"
      - "4 Tipos de SDR"
    justificativa: "Modelo operacional brasileiro"

  - pessoa: "jeremy-haynes"
    peso: 0.65
    dominios_absorvidos:
      - "Scaling Math"
      - "Capacity-Based Hiring"
      - "Marketing-Sales Coordination"
    path: "/knowledge/dossiers/persons/DOSSIER-JEREMY-HAYNES.md"
    justificativa: "Coordenacao de escala marketing-vendas"

  - pessoa: "THE-SCALABLE-COMPANY"
    peso: 0.70
    dominios_absorvidos:
      - "CABs (Critical Accountability Bullets)"
      - "Manual Scorecards > Automated"
      - "Traffic Light Leadership"
      - "Meeting Rhythm (1:1s, Weekly)"
    path: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    justificativa: "Accountability systems e scorecards para gestao de vendas"
    # NOVO Phase 5.3 - 2026-01-10
    insights_adicionais:
      - id: "TSC-CAB001"
        tema: "CABs (Critical Accountability Bullets)"
        descricao: "3-5 métricas máximo por time. Foco nos números que MOVEM O PONTEIRO."
        aplicacao: "Definir scorecards de time de vendas com 3-5 métricas, não 20."
      - id: "TSC-MSC001"
        tema: "Manual Scorecards > Automated"
        descricao: "Preencher manualmente cria ownership + insights. Automação divorcia time dos números."
        aplicacao: "Vendedores preenchem próprios scorecards - desenvolvem 'Matrix vision' para padrões."
      - id: "TSC-TL002"
        tema: "Traffic Light Leadership para Sales"
        descricao: "RED (treinar), YELLOW (acompanhar), GREEN (autonomia). Objetivo: tudo GREEN."
        aplicacao: "Mapear cada vendedor em cada competência (discovery, pitch, objections, close)."
      - id: "TSC-MR002"
        tema: "Meeting Rhythm para Sales Team"
        descricao: "QSP trimestral + Weekly Check-in + 1:1 semanal. Ad hoc meetings = planning failure."
        aplicacao: "Se time pede muita reunião fora do ritmo, algo está errado no sistema."

