# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORKS CORE
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  nepq_sequence:
    fases:
      - fase: "1. Connecting"
        objetivo: "Estabelecer rapport e status frame"
        tonalidade: "Curious + Confused"
        perguntas_chave:
          - "What made you decide to take this call today?"
          - "What's going on in your business right now?"
      - fase: "2. Discovery (Situation)"
        objetivo: "Mapear situacao atual"
        tonalidade: "Curious"
        perguntas_chave:
          - "Walk me through your current process..."
          - "How are you currently handling...?"
      - fase: "3. Discovery (Problem)"
        objetivo: "Identificar problemas e consequencias"
        tonalidade: "Concerned"
        perguntas_chave:
          - "What challenges are you facing with...?"
          - "How is that affecting your...?"
      - fase: "4. Transition"
        objetivo: "Criar desejo de mudanca"
        tonalidade: "Challenging"
        perguntas_chave:
          - "What happens if nothing changes?"
          - "How long can you afford to wait?"
      - fase: "5. Commitment"
        objetivo: "Facilitar decisao propria"
        tonalidade: "Direct"
        perguntas_chave:
          - "Do you feel like this could be what you're looking for?"
          - "Well, why do you feel like it is though?"
          - "What would you like to do from here?"
    fonte: "^[insight_id:JM-NEPQ001]"
    path_raiz: "/inbox/JEREMY MINER/"

  seven_tonalities:
    tonalidades:
      - nome: "Curious"
        uso: "Discovery - genuina curiosidade"
        exemplo: "I'm curious... what made you..."
      - nome: "Confused"
        uso: "Desarmar resistencia"
        exemplo: "Help me understand..."
      - nome: "Concerned"
        uso: "Mostrar empatia com problema"
        exemplo: "That sounds challenging..."
      - nome: "Challenging"
        uso: "Criar tensao produtiva"
        exemplo: "What happens if nothing changes?"
      - nome: "Direct"
        uso: "Commitment questions"
        exemplo: "What would you like to do?"
      - nome: "Playful"
        uso: "Aliviar tensao"
        exemplo: "Between you and me..."
      - nome: "Empathetic"
        uso: "Validar emocoes"
        exemplo: "I can imagine how frustrating..."
    fonte: "^[insight_id:JM-TON001]"
    aplicacao: "Cada fase da venda tem tonalidade ideal"

  three_commitment_questions:
    perguntas:
      - "1. Do you feel like this could be what you're looking for?"
      - "2. Well, why do you feel like it is though? (self-persuasion trigger)"
      - "3. What would you like to do from here? (natural next step)"
    mecanismo: "Prospect se convence, nao e convencido"
    fonte: "^[insight_id:JM-COM001]"
    aplicacao: "Substituir qualquer tecnica de fechamento tradicional"

