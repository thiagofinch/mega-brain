# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS DE RESOLUCAO DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

resolucao_de_conflitos:
  regra_geral: |
    1. Consenso forte (3+ fontes) → usar sem ressalva
    2. Consenso parcial (2 fontes) → usar com nota de incerteza
    3. Conflito mapeado → aplicar regra específica
    4. Conflito não mapeado → apresentar ambas posições ao usuário

  preferencias_contextuais:
    - contexto: "prospecção pura"
      priorizar: "JORDAN-LEE"
      razao: "Especialista em volume e outbound"
      fonte: "^[insight_id:JL001]"                                             # RASTREABILIDADE

    - contexto: "qualificação"
      priorizar: "cole-gordon"
      razao: "Foco em proteger tempo do closer"
      fonte: "^[insight_id:CG-QUAL001]"                                        # RASTREABILIDADE

    - contexto: "mercado brasileiro"
      razao: "Calibração cultural e modelo local"

    - contexto: "progressão de carreira"
      priorizar: "alex-hormozi"
      razao: "Farm System é referência"
      fonte: "^[insight_id:SS001]"                                             # RASTREABILIDADE

