# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORKS CORE
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  seven_beliefs:
    discovery_beliefs:
      - belief: "1. PAIN"
        descricao: "Tenho um problema real que precisa resolver"
      - belief: "2. DOUBT"
        descricao: "Sozinho, não vou conseguir"
      - belief: "3. COST"
        descricao: "Se não resolver, vai piorar/custar caro"
      - belief: "4. DESIRE"
        descricao: "Existe um futuro melhor possível"
      - belief: "5. MONEY"
        descricao: "O investimento vale o resultado"
      - belief: "6. SUPPORT"
        descricao: "Preciso de ajuda especializada"
    pitch_belief:
      - belief: "7. VEHICLE"
        descricao: "ESTA solução é a certa pra mim"
        responsavel: "Closer"
    fonte: "^[insight_id:7B001]"
    path_raiz: "/inbox/COLE GORDON/COURSES/SALES MASTERCLASS.txt"
    aplicacao: "6 Beliefs no Discovery (SDS), 1 no Pitch (Closer)"

  hell_heaven_island:
    hell_island:
      - "Problema atual"
      - "Custo do status quo"
      - "Dor que sente"
      - "Consequências de não agir"
    heaven_island:
      - "Resultado desejado"
      - "Benefícios claros"
      - "Vida após resolver"
      - "Ganhos tangíveis"
    objetivo: "Criar tensão interna entre os dois estados"
    fonte: "^[insight_id:CG-HELL001]"
    path_raiz: "/inbox/COLE GORDON/COURSES/SALES MASTERCLASS.txt"
    aplicacao: "Visualização durante Discovery para amplificar motivação"

  dickens_process:
    perguntas:
      - "Se NÃO resolver, em 1 ano, onde você estará?"
      - "E em 3 anos, como vai ser?"
      - "Daqui a 5 anos, o que acontece?"
      - "E em 10 anos? Como você se sente com isso?"
    objetivo: "Amplificar custo de não agir"
    fonte: "^[insight_id:CG-DICK001]"
    path_raiz: "/inbox/COLE GORDON/COURSES/SALES MASTERCLASS.txt"
    aplicacao: "Usar na fase de IMPACTO do Discovery"

  consistency_bias:
    tecnica: "Fazer prospect DIZER as beliefs, não só concordar"
    principio: "Cialdini - pessoas mantêm consistência com o que disseram"
    fonte: "^[insight_id:CG-CONS001]"
    path_raiz: "/inbox/COLE GORDON/COURSES/SALES MASTERCLASS.txt"
    aplicacao: "Perguntar em vez de afirmar durante Discovery"

