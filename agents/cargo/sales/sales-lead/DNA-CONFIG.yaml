# ═══════════════════════════════════════════════════════════════════
# COMPOSICAO DO DNA
# ═══════════════════════════════════════════════════════════════════

dna_primario:
  - pessoa: "cole-gordon"
    peso: 0.90
    dominios_absorvidos:
      - "Player-Coach Model"
      - "Sales Management Progression"
      - "Coaching Operacional"
      - "Fase 3 Framework"
      - "Leadership Transition"
    path: "/knowledge/dna/persons/cole-gordon"
    justificativa: "Principal fonte para modelo player-coach e progressao de gestao"

  - pessoa: "alex-hormozi"
    peso: 0.65
    dominios_absorvidos:
      - "Benchmark Thinking"
      - "Performance Standards"
      - "Team Development"
    path: "/knowledge/dna/persons/alex-hormozi"
    justificativa: "Complemento para mentalidade de alta performance"

