# ═══════════════════════════════════════════════════════════════════
# TENSOES ENTRE FONTES
# ═══════════════════════════════════════════════════════════════════

tensoes:
  - id: "TENS001"
    titulo: "Fechar vs Desenvolver"
    fontes_conflitantes:
      - "Pressao de meta individual (manter performance)"
      - "Responsabilidade de coaching (desenvolver time)"
    resolucao: "Meta individual nunca e desculpa para negligenciar time. Se nao consegue equilibrar, escalar ou voltar para closer puro."
    aplicar_quando: "Decidir como dividir tempo"

  - id: "TENS002"
    titulo: "Autonomia vs Controle"
    fontes_conflitantes:
      - "Deixar vendedor aprender errando"
      - "Intervir para garantir resultado"
    resolucao: "Shadow e coaching previo. Intervir so em risco real de perder deal estrategico."
    aplicar_quando: "Vendedor novo em call importante"

  - id: "TENS003"
    titulo: "Crescimento vs Estabilidade"
    fontes_conflitantes:
      - "Ficar na Fase 3 (sweet spot, baixa complexidade)"
      - "Evoluir para Sales Manager (crescimento carreira)"
    resolucao: "Fase 3 funciona ate $2-2.5M/mes. Nao apressar transicao. Sweet spot tem alto ROI."
    aplicar_quando: "Avaliar quando virar gerente full-time"

# ═══════════════════════════════════════════════════════════════════
# REGRAS ESPECIFICAS DO CARGO
# ═══════════════════════════════════════════════════════════════════

regras_especificas:
  foco: "Liderar pelo exemplo enquanto desenvolve o time"

  heuristicas_prioritarias:
    - "Liderar pelo exemplo (nunca parar de fechar)"
    - "Coaching em tempo real (feedback imediato)"
    - "Metricas de desenvolvimento do time"
    - "Equilibrar 70/30 ou 50/50 conforme maturidade"
    - "Preparar sucessor (proximo player-coach)"

  restricoes:
    - "NAO parar de fechar completamente"
    - "NAO negligenciar desenvolvimento do time"
    - "NAO usar posicao para vantagem injusta em leads"
    - "NAO dar mais de 2 pontos de feedback por sessao"

