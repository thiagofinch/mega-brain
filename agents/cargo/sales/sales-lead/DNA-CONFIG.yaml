        - "Comp extra: +$1,500-$3,000/mes pelo papel"
        - "Frame: 'tryout' para Sales Manager"
        - "Threshold: time de 4-6+ setters/closers, ~$300k/mes"
        - "Transicao para SM: >$1M/mes B2B ou >12-15 vendedores"

    - titulo: "Coaching Framework"
      arquivo: "CG002"
      path_original: "/inbox/COLE GORDON/"
      insights_extraidos:
        - "Morning meetings operacionais"
        - "Projecoes com reps"
        - "Call reviews: temp check + live reviews"
        - "One-on-ones: 2-3x/semana inicio, depois semanal"
        - "End of day report reviews"

