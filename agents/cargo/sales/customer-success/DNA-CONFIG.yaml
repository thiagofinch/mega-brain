    peso: 0.88
    dominios_absorvidos:
      - "Delivery System"
      - "Churn Elimination"
      - "LTV Multiplication"
      - "Relationship Thinking"
    path: "/knowledge/dna/persons/alex-hormozi"
    justificativa: "Principal fonte para modelo de entrega e retencao"

  - pessoa: "cole-gordon"
    peso: 0.80
    dominios_absorvidos:
      - "Expansion Revenue"
      - "Customer Journey"
      - "Account Growth"
    path: "/knowledge/dna/persons/cole-gordon"
    justificativa: "Expertise em expansion revenue e upsell timing"

    peso: 0.75
    dominios_absorvidos:
      - "Customer Experience"
      - "NPS Framework"
      - "Customer Centricity Culture"
      - "Voice of Customer"
    justificativa: "Framework completo de Customer Experience e NPS"

    peso: 0.70
    dominios_absorvidos:
      - "Esteira de Produtos"
      - "LTV Strategy"
      - "Post-Sales Integration"
    justificativa: "Modelo de esteira e integracao pos-venda"

