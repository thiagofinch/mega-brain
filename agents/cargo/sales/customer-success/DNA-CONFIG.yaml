        - "7.5x profit per location possivel com churn reduzido (WeWhiten case)"
        - "Relationship Thinking vs Transaction Thinking"
        - "Customer-focused: How do I help them more?"

  cole_gordon:
    - titulo: "Sales Management Progression"
      arquivo: "CG001"
      path_original: "/inbox/COLE GORDON/"
      insights_extraidos:
        - "Expansion revenue e parte do trabalho de CS"
        - "Timing de upsell: apos cliente ter sucesso"
        - "Nunca oferecer upsell com problema aberto"

    - titulo: "FCX Customer Experience"
      insights_extraidos:
        - "NPS = %Promotores - %Detratores"
        - "NPS 75-100 = excelente, 50-74 = muito bom"
        - "CLV = (Ticket medio x Frequencia) x Lifetime"
        - "Voice of Customer: pesquisas, NPS, reviews, social listening"
        - "Customer Journey Map: pre-compra → compra → pos-compra"
        - "Cultura customer centric = todos os setores alinhados"
        - "Employee Experience impacta Customer Experience"

      insights_extraidos:
        - "CS = pos-venda focado em LTV"
        - "Esteira: Front End → Back End → High End"
        - "Outputs: revenda, indicacoes, embaixadores"
        - "Integracao com Sales Farming para reativacao"

