# DNA-CONFIG.yaml - CFO (Chief Financial Officer)
# Configuracao de fontes de DNA para este cargo
#
# Versao: 3.0.0
# Data: 2026-01-10
#
# CHANGELOG:
# v3.0.0 (2026-01-10): BUG #1 FIX - Cascateamento completo
#                      - Removido AGG-COMPENSATION.yaml (não existe)
#                      - Removido AGG-OPERATIONS.yaml (não existe)
#                      - Adicionado AGG-VENDAS.yaml (métricas de vendas)
#                      - Adicionado AGG-OFFERS.yaml (unit economics de ofertas)
#                      - Todos paths validados (INTEGRITY CHECK)
# v1.0.0 (2025-12-23): Versão inicial

cargo: "CFO"
versao: "3.0.0"
nivel: "C-LEVEL"
natureza: "HIBRIDO"
data_criacao: "2025-12-23"
ultima_atualizacao: "2026-01-10"

# ═══════════════════════════════════════════════════════════════════════════════
# CONSTITUICAO (Layer 1 - Principios compartilhados)
# ═══════════════════════════════════════════════════════════════════════════════

constituicao:
  path: "/agents/CONSTITUTION/BASE-CONSTITUTION.md"

# ═══════════════════════════════════════════════════════════════════════════════
# MEMORIA DO CARGO
# ═══════════════════════════════════════════════════════════════════════════════

memoria:
  path: "./MEMORY.md"

# ═══════════════════════════════════════════════════════════════════════════════
# FONTES DE DNA
# ═══════════════════════════════════════════════════════════════════════════════

dna_sources:

  agregado:
    - dominio: "vendas"
      path: "/knowledge/dna/AGGREGATED/AGG-VENDAS.yaml"
      peso: 0.80
      quando_usar: "Métricas de vendas, CAC, conversão, revenue"
      justificativa: "CFO precisa entender métricas de vendas para planning financeiro"

    - dominio: "offers"
      path: "/knowledge/dna/AGGREGATED/AGG-OFFERS.yaml"
      peso: 0.85
      quando_usar: "Unit economics de ofertas, pricing, margens"
      justificativa: "CFO precisa entender unit economics para decisões de pricing"

  primario:
    - pessoa: "SAM-OVEN"
      path: "/knowledge/dna/persons/SAM-OVEN"
      dominios_usados: ["operations", "scaling"]
      peso: 0.85
      quando_usar: "Sistemas financeiros, eficiencia"

    - pessoa: "alex-hormozi"
      path: "/knowledge/dna/persons/alex-hormozi"
      dominios_usados: ["scaling", "offers"]
      peso: 0.80
      quando_usar: "Unit economics de ofertas"

    - pessoa: "cole-gordon"
      path: "/knowledge/dna/persons/cole-gordon"
      dominios_usados: ["compensation"]
      peso: 0.75
      quando_usar: "Estrutura de comissao"

# ═══════════════════════════════════════════════════════════════════════════════
# MAPA DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

conflitos:
  path: "/knowledge/dna/MAPS/MAP-CONFLITOS.yaml"

# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS DE RESOLUCAO
# ═══════════════════════════════════════════════════════════════════════════════

resolucao_de_conflitos:
  regra_geral: |
    1. Consenso forte → usar sem ressalva
    2. Consenso parcial → usar com nota
    3. Conflito mapeado → aplicar regra
    4. Conflito nao mapeado → apresentar opcoes

  preferencias_contextuais:
    - contexto: "conservador/risco"
      priorizar: "SAM-OVEN"
      razao: "Foco em sustentabilidade"

    - contexto: "crescimento agressivo"
      priorizar: "alex-hormozi"
      razao: "Foco em velocidade"

# ═══════════════════════════════════════════════════════════════════════════════
# PROTOCOLO DE RACIOCINIO
# ═══════════════════════════════════════════════════════════════════════════════

raciocinio:
  path: "/system/protocols/dna/REASONING-MODEL-PROTOCOL.md"

# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS ESPECIFICAS
# ═══════════════════════════════════════════════════════════════════════════════

regras_especificas:
  foco: "Saude financeira e sustentabilidade"

  heuristicas_prioritarias:
    - "Sempre calcular impacto em margem"
    - "Considerar fluxo de caixa em decisoes"
    - "Priorizar previsibilidade financeira"

  restricoes:
    - "NAO aprovar investimentos sem ROI projetado"
    - "SEMPRE considerar risco de downside"
