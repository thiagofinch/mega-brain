# REGRAS DE RESOLUCAO DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

resolucao_de_conflitos:
  regra_geral: |
    1. Consenso forte (3+ fontes) → usar sem ressalva
    2. Consenso parcial (2 fontes) → usar com nota de incerteza
    3. Conflito mapeado → aplicar regra específica
    4. Conflito não mapeado → apresentar ambas posições ao usuário

  preferencias_contextuais:
    - contexto: "lançamento de produto"
      priorizar: "alex-hormozi"
      razao: "Mais experiência em launches de alta receita"
      fonte: "^[insight_id:OF001]"                                    # RASTREABILIDADE

    - contexto: "posicionamento de marca"
      priorizar: "SAM-OVEN"
      razao: "Purple Ocean é framework mais robusto para diferenciação"
      fonte: "^[insight_id:PO001]"                                    # RASTREABILIDADE

    - contexto: "aquisição paga"
      priorizar: "jeremy-haynes"
      razao: "Especialista em paid acquisition"
      fonte: "^[insight_id:ACQ001]"                                   # RASTREABILIDADE

    - contexto: "mercado brasileiro"
      priorizar: "VINICIUS-DE-SA"
      razao: "Calibração cultural local"
      fonte: "^[insight_id:ICP001]"                                   # RASTREABILIDADE

