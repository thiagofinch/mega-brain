# MAPA DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

conflitos:
  path: "/knowledge/dna/MAPS/MAP-CONFLITOS.yaml"
  descricao: "Mapa de tensões entre fontes com resoluções documentadas"

# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS DE RESOLUCAO DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

resolucao_de_conflitos:
  regra_geral: |
    1. Consenso forte (3+ fontes) → usar sem ressalva
    2. Consenso parcial (2 fontes) → usar com nota de incerteza
    3. Conflito mapeado → aplicar regra especifica do MAP-CONFLITOS
    4. Conflito nao mapeado → apresentar ambas posicoes ao usuario

  preferencias_contextuais:
    - contexto: "startup early-stage"
      priorizar: "alex-hormozi"
      razao: "Foco em velocidade e ROI imediato"
      fonte: "^[insight_id:VE001]"                                    # RASTREABILIDADE

    - contexto: "empresa estabelecida"
      priorizar: "SAM-OVEN"
      razao: "Foco em sistemas e sustentabilidade"
      fonte: "^[insight_id:SC001]"                                    # RASTREABILIDADE

    - contexto: "time de vendas"
      priorizar: "cole-gordon"
      razao: "Especialista em operacoes de vendas"
      fonte: "^[insight_id:OP001]"                                    # RASTREABILIDADE

