# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORKS CORE
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  processo_5_elementos:
    elementos:
      - "1. Trigger - O que inicia o processo?"
      - "2. Steps - Quais os passos exatos?"
      - "3. Owner - Quem é responsável por cada step?"
      - "4. SLA - Qual o tempo esperado?"
      - "5. Output - O que indica conclusão?"
    fonte: "^[insight_id:SYS001]"
    path_raiz: "/inbox/SAM OVENS (SETTERLUN UNIVERSITY)/COURSES/CONSULTING ACCELERATOR.txt"
    aplicacao: "Todo processo precisa responder os 5"

  value_ladder:
    modelos:
      - modelo: "DIY"
        escalabilidade: "Alta"
        ticket: "Baixo"
        margem: "Alta"
        capacidade: "Alta"
      - modelo: "DWY"
        escalabilidade: "Média"
        ticket: "Médio"
        margem: "Média"
        capacidade: "Média"
      - modelo: "DFY"
        escalabilidade: "Baixa"
        ticket: "Alto"
        margem: "Variável"
        capacidade: "Baixa"
    fonte: "^[insight_id:DEL001]"
    aplicacao: "Escolha de modelo de entrega"

  stages_of_giving_up:
    stages:
      - faixa: "$0-1M"
        dar_up: "Tempo pessoal"
      - faixa: "$1-3M"
        dar_up: "Algumas tarefas"
      - faixa: "$3-10M"
        dar_up: "Departamentos inteiros"
      - faixa: "$10-50M"
        dar_up: "C-level"
      - faixa: "$50M+"
        dar_up: "Controle diário"
    fonte: "^[insight_id:TR001]"
    path_raiz: "/inbox/alex hormozi/MASTERMINDS/HOW I SCALED MY SALES TEAM [TAKI MOORE MASTERMIND].txt"
    aplicacao: "Transição CEO → Owner"

  checklist_escala:
    criterios:
      - "1. Processo existe? (Está documentado?)"
      - "2. Funciona sem mim? (Deleguei ou centralizei?)"
      - "3. Tem métricas? (Sei se está funcionando?)"
      - "4. Tem margem? (Suporta mais volume?)"
    regra: "4 'sim' = escalar. 1 'não' = consertar primeiro."
    fonte: "^[insight_id:SC001]"
    aplicacao: "Decisão de escalar operação"

  # ─────────────────────────────────────────────────────────────────────────────
  # FRAMEWORKS THE SCALABLE COMPANY (Ryan Deiss)
  # ─────────────────────────────────────────────────────────────────────────────

  scalableos_3_phase:
    fases:
      - fase: "BUILD"
        duracao: "6-8 semanas"
        objetivo: "Construir operating system"
        atividades:
          - "Map value engines (Growth, Fulfillment, Innovation)"
          - "Identify power stages (2-3 per engine)"
          - "Create playbooks for power stages"
          - "Build scorecards (manual, not automated)"
      - fase: "INSTALL"
        duracao: "2-3 semanas"
        objetivo: "Instalar na organização"
        atividades:
          - "Train team on playbooks"
          - "Implement meeting rhythm"
          - "Deploy scorecards"
          - "Assign playbook owners"
      - fase: "OPTIMIZE"
        duracao: "Ongoing"
        objetivo: "Melhorar continuamente"
        atividades:
          - "Weekly scorecard reviews"
          - "Quarterly QSP meetings"
          - "Playbook version updates"
          - "Traffic light delegation progress"
    fonte: "^[insight_id:TSC-OS001]"
    path_raiz: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    aplicacao: "Implementação de operating system empresarial"

  traffic_light_leadership:
    niveis:
      - nivel: "RED"
        descricao: "Do FOR them"
        comportamento: "Você executa, eles observam"
        quando: "Novo processo, nova pessoa, alta criticidade"
      - nivel: "YELLOW"
        descricao: "Do WITH them"
        comportamento: "Execução conjunta, coaching ativo"
        quando: "Processo aprendido, competência em desenvolvimento"
      - nivel: "GREEN"
        descricao: "THEY do (you're available)"
        comportamento: "Eles executam, você disponível para dúvidas"
        quando: "Competência demonstrada, confiança alta"
    regra: "Objetivo é mover tudo para GREEN. Se pessoa sai, volta para RED."
    fonte: "^[insight_id:TSC-TL001]"
    path_raiz: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    aplicacao: "Delegação progressiva e desenvolvimento de autonomia"

  qsp_meeting_5_steps:
    estrutura:
      - step: "1. Financials"
        duracao: "30-60 min"
        objetivo: "Review dos números do quarter anterior"
      - step: "2. North Star"
        duracao: "60-90 min"
        objetivo: "Definir target do próximo quarter"
      - step: "3. Initiatives"
        duracao: "2-3 horas"
        objetivo: "Identificar iniciativas para atingir target"
      - step: "4. Theme"
        duracao: "30 min"
        objetivo: "Definir tema inspirador do quarter"
      - step: "5. OS Review"
        duracao: "1-2 horas"
        objetivo: "Atualizar playbooks, scorecards, estrutura"
    formato: "2 dias presencial ou 2-3 meio-dias virtual"
    frequencia: "Trimestral (end of quarter)"
    fonte: "^[insight_id:TSC-MR001]"
    path_raiz: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    aplicacao: "Planejamento trimestral estruturado"

  playbook_3d_process:
    etapas:
      - etapa: "DEFINE"
        atividades:
          - "Identify power stages (critical actions)"
          - "Map current state (what happens now)"
          - "Define desired outcome"
      - etapa: "DESIGN"
        atividades:
          - "Do-Document-Do Again methodology"
          - "Create checklist steps"
          - "Field test with non-creator"
          - "Capture 9/10 missed steps"
      - etapa: "DEPLOY"
        atividades:
          - "Train team (cross-train everyone)"
          - "Assign playbook owner (not CEO)"
          - "Version control and updates"
          - "Celebrate completion"
    regra_ouro: "9/10 vezes o criador esquece passos do próprio checklist"
    fonte: "^[insight_id:TSC-PB001]"
    path_raiz: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    aplicacao: "Criação de playbooks que funcionam"

  meeting_rhythm_architecture:
    ritmos:
      - tipo: "QSP"
        frequencia: "Trimestral"
        duracao: "2 dias"
        objetivo: "Strategic planning, target setting"
      - tipo: "MBR"
        frequencia: "Mensal"
        duracao: "2-4 horas"
        objetivo: "Monthly Business Review, progress vs targets"
      - tipo: "Weekly Check-in"
        frequencia: "Semanal"
        duracao: "60-90 min"
        objetivo: "Scorecard review, blockers, priorities"
      - tipo: "One-on-ones"
        frequencia: "Semanal/Quinzenal"
        duracao: "30-60 min"
        objetivo: "Individual coaching, development"
    regra: "Too many ad hoc meetings = planning failure signal"
    fonte: "^[insight_id:TSC-MR001]"
    path_raiz: "/knowledge/dna/persons/THE-SCALABLE-COMPANY"
    aplicacao: "Arquitetura de reuniões que elimina ad hocs"

  manual_scorecards_philosophy:
    principio: "Manual scorecards > Automated scorecards"
    razoes:
      - "Greater insights - você VÊ os números, desenvolve 'Matrix vision'"
      - "Greater ownership - time sente responsabilidade pelo que preenche"
      - "Automation divorces team from numbers"
      - "Manual entry = forced reflection"
    metricas:
