name: Test

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'engine/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml pytest pytest-cov
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python3 -m pytest tests/python/ -v --tb=short \
            --cov=engine/intelligence \
            --cov-report=term-missing \
            --cov-fail-under=9

      - name: Run E2E BrainEngine tests
        run: |
          python3 -m pytest tests/e2e/ -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  secrets-scan:
    runs-on: ubuntu-latest
    # gitleaks-action Post-step posts a PR summary comment; without write
    # access it crashed "Resource not accessible by integration". gitleaks
    # itself already passed (0 leaks). Grant minimal perms for the comment.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
