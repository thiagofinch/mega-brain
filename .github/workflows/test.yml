name: Test

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml pytest pytest-cov
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python3 -m pytest tests/python/ -v --tb=short \
            --cov=core/intelligence \
            --cov-report=term-missing \
            --cov-fail-under=9

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
