name: Claude Code

on:
  # Review automático em toda PR
  pull_request:
    types: [opened, synchronize]

  # Responde quando mencionam @claude
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Gate: expose whether ANTHROPIC_API_KEY is configured. The `secrets` context is
  # not allowed in a job-level `if:`, so we surface it as a job output and gate the
  # bot jobs on it. Without the key, downstream jobs are SKIPPED (not failed).
  gate:
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - name: Check for ANTHROPIC_API_KEY
        id: check
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "has_key=$HAS_KEY" >> "$GITHUB_OUTPUT"

  # Job 1: Review automático em PRs
  auto-review:
    needs: gate
    if: github.event_name == 'pull_request' && needs.gate.outputs.has_key == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please review this pull request and look for bugs and security issues.
            Only report on bugs and potential vulnerabilities you find. Be concise.
            If you find issues that can be fixed, create a commit with the fix.
          claude_args: '--allowed-tools "Bash(gh:*),Edit(*),Write(*),Read(*)"'

  # Job 2: Responde a @claude mentions
  claude-mention:
    needs: gate
    if: |
      needs.gate.outputs.has_key == 'true' && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: '--allowed-tools "Bash(gh:*),Edit(*),Write(*),Read(*)"'

