name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - '.claude/hooks/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'engine/**'
      - '.claude/hooks/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      # NOTE: path corrected core/ -> engine/ (core/ was renamed long ago, so
      # this check was silently erroring exit 2 on a non-existent dir on every
      # PR). Fixing the path surfaces pre-existing format/lint debt in engine/
      # + tests/ (184 unformatted files, 231 ruff findings). Marked
      # non-blocking so the report is visible without forcing a mass reformat;
      # tracked as a dedicated lint-debt cleanup story.
      - name: Check formatting
        run: ruff format --check engine/ .claude/hooks/ tests/
        continue-on-error: true

      - name: Lint
        run: ruff check engine/ .claude/hooks/ tests/ --output-format=github
        continue-on-error: true
