name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '.claude/hooks/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - '.claude/hooks/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check core/ .claude/hooks/ tests/

      - name: Lint
        run: ruff check core/ .claude/hooks/ tests/ --output-format=github
